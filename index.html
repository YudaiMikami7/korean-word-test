<style>
/* LINE Seed JP（公式配布woff2を同梱） */
@font-face{font-family:"LINESeedJP";src:url("fonts/LINESeedJP-Rg.woff2") format("woff2");font-weight:400;font-display:swap}
@font-face{font-family:"LINESeedJP";src:url("fonts/LINESeedJP-Bd.woff2") format("woff2");font-weight:700;font-display:swap}
@font-face{font-family:"LINESeedJP";src:url("fonts/LINESeedJP-Eb.woff2") format("woff2");font-weight:800;font-display:swap}
/* 韓国語は LINE Seed KR（JPにハングルが無いためフォールバックで適用） */
@font-face{font-family:"LINESeedKR";src:url("fonts/LINESeedKR-Rg.woff2") format("woff2");font-weight:400;font-display:swap}
@font-face{font-family:"LINESeedKR";src:url("fonts/LINESeedKR-Bd.woff2") format("woff2");font-weight:700 800;font-display:swap}
:root{
  --bg:#000; --panel:#16181c; --panel2:#1f2125; --gray:#26282d; --gray-h:#33363c;
  --line:#2a2d33; --text:#f2f3f5; --mute:#FFFFFF; --faint:rgba(255,255,255,.78);
  --red:#ff3b3b; --blue:#2f8bff; --green:#4cd964; --gold:#ffc83c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
  font-family:"LINESeedJP","LINESeedKR","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo","Noto Sans CJK JP","Noto Sans KR",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}
body{display:flex;justify-content:center}
.app{width:100%;max-width:602px;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)} /* ノッチ/ホームバー回避 */

button{font-family:inherit;touch-action:manipulation} /* タップ遅延(300ms)とダブルタップズームを抑制 */
.hidden{display:none!important}

/* ===== screens ===== */
.screen{flex:1;display:none;flex-direction:column;min-height:0;position:relative;z-index:1} /* 玉レイヤー(z0)より前面 */
.screen.on{display:flex}

/* ===== top bar (quiz) ===== */
/* 問題番号・残り時間は白文字 */
.qbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;font-size:13px;color:#FFFFFF;font-weight:700;gap:12px}
.qbar{position:relative}
.qadv{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;background:transparent;border:none;color:#fff;font-size:11px;font-weight:800;padding:4px;cursor:pointer;visibility:hidden} /* タップで次への切替（画面中央・出題番号と同時に表示） */
.qsw{width:40px;height:22px;border-radius:999px;background:rgba(0,0,0,.35);position:relative;transition:background .2s;display:inline-block}
.qsw.on{background:#00C24E}
.qsw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
.qsw.on i{left:20px}
.qhome{background:rgba(0,0,0,.8);border:none;color:#fff;width:32px;height:32px;font-size:16px;cursor:pointer;flex:0 0 auto}
.qbar .prog{letter-spacing:.5px}
.qbar .time{color:#FFFFFF;font-variant-numeric:tabular-nums;margin-left:auto}
.tbar{height:3px;margin:8px 18px 0;background:rgba(0,0,0,.35);border-radius:3px;overflow:hidden}
.tfill{height:100%;width:100%;background:#00FF37;transition:width .1s linear} /* 制限時間バーは緑（ホームのトンマナ） */
.tfill.warn{background:#FFC400}

/* ===== question ===== */
.qstage{flex:1;display:flex;flex-direction:column;min-height:0}
.qmain{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8vh 20px 0;text-align:center}
.qword{font-size:clamp(34px,9vw,46px);font-weight:800;line-height:1.25;word-break:break-all;text-shadow:0 2px 6px rgba(0,0,0,.5),0 0 2px rgba(0,0,0,.4)} /* 白文字が背景色で埋もれないよう黒影 */
.qword.ja{font-weight:600}
/* 単語と選択肢の間に表示する関連画像 */
.qimg{margin-top:3vh;display:flex;justify-content:center;width:100%}
.qimg img{width:min(80%,360px);max-height:24vh;object-fit:cover;border:1px solid var(--line);display:block;background:var(--panel)}
.qbottom{padding:0 18px calc(18px + env(safe-area-inset-bottom))}

/* choices */
.choices{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;touch-action:none} /* ドラッグ選択のためスクロールに奪われない */
.choice{position:relative;background:rgba(0,0,0,.8);border:none;border-radius:0;padding:18px;font-size:21px;font-weight:700;color:#fff;
  text-align:center;cursor:pointer;transition:background .12s,transform .08s,box-shadow .1s;min-height:60px;user-select:none;-webkit-user-select:none}
.choice.cand{box-shadow:inset 0 0 0 3px #FFD84D,0 0 18px 3px rgba(255,216,77,.85);background:rgba(0,0,0,.68);z-index:1} /* 指が触れている候補=黄色光彩 */
.chspk{position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:.8;pointer-events:none;display:flex}
.oa-spkrow{display:flex;justify-content:center;margin:6px 0} /* 音声ボタンを正解の上に独立した列として置く */
.oa-spk{background:rgba(0,0,0,.55);border:none;border-radius:22px;height:42px;padding:0 16px;gap:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center} /* 書き取り正解の上の音声ボタン */
.oa-spktxt{color:#fff;font-size:14px;font-weight:800}
.cdown{display:flex;align-items:center;justify-content:center;height:60vh}
.cnum{font-size:170px;font-weight:900;color:#fff;line-height:1;animation:cpop .4s ease}
@keyframes cpop{from{transform:scale(1.8);opacity:.15}to{transform:scale(1);opacity:1}}
.choice:active{transform:scale(.98);background:rgba(0,0,0,.65)}
/* 回答後のハイライト：正解=赤 / 選んだ誤答=青 / その他=暗い灰色のまま。色は20%薄く(不透明度.8)、視認性は維持 */
.choice.correct{background:rgba(255,59,59,.8);color:#fff}
.choice.wrong{background:rgba(47,139,255,.8);color:#fff}

/* 正解単語が降り積もる背景レイヤー（UIより背面・操作は透過） */
#s-quiz{position:relative}
#s-quiz .qbar,#s-quiz .tbar,#s-quiz .qstage{position:relative;z-index:1} /* 出題UIは常に降下レイヤーより前面 */
.q-rain{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
#home-rain{top:-225px;height:1178px;z-index:0;opacity:.42;transition:opacity .3s ease} /* ホームの玉レイヤー：背景で主張しすぎないよう半透明に。現在ROOMのslide-inner最背面に挿入 */
.home-wrap.status #home-rain,.home-wrap.hiderail #home-rain{opacity:0}
.qr-ball{position:absolute;left:0;top:0;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.55);
  box-shadow:inset 0 -6px 12px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center} /* 白半透明の丸カプセル（will-changeはJSで落下中のみ付与） */
.qr-ball img{width:72%;height:72%;object-fit:contain;pointer-events:none}

/* unknown btn */
.unknown{display:block;margin:0 auto;background:rgba(0,0,0,.8);border:none;color:#fff;
  font-size:13px;font-weight:600;padding:9px 22px;border-radius:0;cursor:pointer}
.unknown:active{background:rgba(0,0,0,.65)}

/* ===== overlay symbol ===== */
/* 横:中央 / 縦:中央から画面高の20%上へ / 大きさ1.3倍(46→60vw) / 線2倍(font-weight倍+text-stroke) / 透明度.6維持 */
/* 四択は選択肢の色を見せたいので背景は透明。書き取りは比較テキストを読ませるため暗幕を付ける */
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:auto;background:transparent}
.overlay.backdrop{background:rgba(0,0,0,.72)}
.tap-next{position:absolute;left:0;right:0;bottom:7%;text-align:center;font-size:16px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);animation:bob 1.4s ease-in-out infinite}
/* 大きさ-10%(60→54vw) / 線+20%(1.4→1.68, 1.2→1.44vw) / 縦は5%下へ(-20→-15vh) / 横中央・透明度.6維持 */
.ovsym{font-size:54vw;line-height:1;font-weight:600;opacity:.6;transform:translateY(-15vh);pointer-events:none} /* 装飾記号がボタン等のタップを遮らないように */
.ovsym.o{color:var(--red);-webkit-text-stroke:1.68vw var(--red);text-stroke:1.68vw var(--red)}
.ovsym.x{color:var(--blue);font-weight:400;-webkit-text-stroke:1.44vw var(--blue);text-stroke:1.44vw var(--blue)}
.ovsym.u{color:rgba(255,255,255,.9);font-weight:400;-webkit-text-stroke:1.2vw rgba(255,255,255,.9);text-stroke:1.2vw rgba(255,255,255,.9)} /* わからない=－ */
.ovsym.t{color:#DFB10F;font-weight:400;-webkit-text-stroke:1.44vw #DFB10F;text-stroke:1.44vw #DFB10F} /* 時間切れ=△ */
/* 書き取りの正誤比較：入力=青文字 / 正解=赤文字。問題と選択肢の間（画面中央）に配置 */
.ovans{position:absolute;left:0;right:0;top:30%;transform:translateY(-50%);text-align:center;padding:0 18px;pointer-events:none}
.ovans .oa-spk{pointer-events:auto} /* 音声ボタンだけタップ可能（親はpointer-events:none） */
.ovans .oa-row{margin:8px 0}
.ovans .oa-lab{color:var(--mute);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.ovans .oa-ko{font-size:clamp(38px,10vw,54px);font-weight:800;line-height:1.25;word-break:break-all}
.ovans .oa-ko.correct{color:var(--red)}
.ovans .oa-ko.wrong{color:var(--blue)}

/* ===== writing ===== */
.winput{margin:0 18px;min-height:58px;background:var(--panel);border:1px solid var(--line);border-radius:0;
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;letter-spacing:1px;padding:10px}
.wcaret{display:inline-block;width:2px;height:30px;background:var(--text);margin-left:2px;animation:blink 1s steps(1) infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
/* 成績連動ヒント（先頭1音節）。ボタンではなく自動表示 */
.whint{color:#FFFFFF;font-size:15px;font-weight:700;margin-top:12px}
.whint b{font-size:22px;margin-left:3px}
/* 韓国語キーボードは画面下部に固定。PCでは中央寄せ＋最大幅でアプリ幅に揃える */
.korean-keyboard{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:602px;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line);z-index:50}
.krow{display:flex;gap:5px;justify-content:center;margin-bottom:6px}
.key{flex:1;min-width:0;background:var(--gray);border:none;border-radius:0;color:var(--text);font-size:22px;font-weight:600;
  padding:13px 0;cursor:pointer;min-height:46px}
.key:active{background:var(--gray-h)}
.key.wide{flex:1.5}
.key.fn{background:var(--panel2);color:var(--mute);font-size:13px;font-weight:700}
.key.shifton{background:var(--gray-h);color:var(--text);border:1px solid var(--line)}
/* 操作行：わからない(左) / 回答する(中央・大・緑) / ⌫(右) */
.krow.ctrl .key{font-size:13px;font-weight:700;padding:13px 0}
.key.send{flex:2;background:var(--green);color:#06280f;border:none;font-size:16px;font-weight:800}
.key.send:active{background:#3fbf55}
.key.dontknow{background:var(--gray);border:1px solid var(--line);color:var(--text)}
/* 濃音・合成母音の専用行（下2行）：中央寄せ・縦幅は通常キーの75% */
.krow.extra{justify-content:center}
.krow.extra .key.ex{flex:0 1 48px;max-width:56px;background:var(--panel2);color:var(--text);padding:6px 0;min-height:34px}

/* ===== home ===== */
.home{padding:0 22px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
.home h1{font-size:30px;font-weight:800;margin:0;text-align:center}
.home .sub{color:var(--mute);font-size:14px;text-align:center;line-height:1.7;margin:-4px 0 18px}
.home .ver{color:var(--faint);font-size:11px;font-weight:700;text-align:center;letter-spacing:1px;margin-top:14px}

/* ===== タイプ診断（V2.1: コード＋キャラクターのみの引き算デザイン） ===== */
/* ===== ホーム（602×1178基準・サーモンピンク背景・絶対配置） ===== */
#s-home{background:#E3A38D;flex-direction:row;justify-content:center;align-items:flex-start;overflow:hidden;transition:background-color .5s ease}
.home-wrap{position:relative;flex:0 0 auto;width:602px;height:1178px;background:#E3A38D;
  transform-origin:top center;color:#FFFFFF;font-weight:800; /* 見本はExtraBold相当 */
  transition:background-color .5s ease;
  font-family:"LINESeedJP","LINESeedKR","Hiragino Kaku Gothic ProN",sans-serif}
/* バー：暗いトラック＋内側に角丸フィル（見本準拠） */
.home-wrap .gauge,.dash-head .gauge{position:absolute;background:#333333;border-radius:999px;padding:3px;box-sizing:border-box;z-index:2}
.home-wrap .gfill,.dash-head .gfill{height:100%;border-radius:999px;transition:width .5s ease;width:0}
/* ステータスバーのPWRメータ：最大値→0へ徐々に減り、それを繰り返すドレイン演出（数値は実PWRを別途表示） */
#hv-pwrfill{transition:none;animation:pwrDrain 10s linear infinite}
@keyframes pwrDrain{0%{width:100%}100%{width:0%}}
/* ヘッダー（さらに上へ。茶色領域は黒80%透過。4色ドットは廃止） */
.avatar-circle{position:absolute;left:40px;top:44px;width:114px;height:114px;border-radius:50%;background:#fff;border:5px solid rgba(0,0,0,.8);box-sizing:border-box;overflow:hidden;cursor:pointer;z-index:2} /* 背景=タイプ/PWRページと同じグレー */
.avatar-image{width:100%;height:100%;object-fit:contain;padding:12px;box-sizing:border-box}
/* アバター：キャラクター⇄MBTI(4文字2行・軸カラー) を一定時間で回転入替 */
.avatar-circle .avatar-image{transition:transform .5s ease,opacity .4s ease;backface-visibility:hidden}
.avatar-mbti{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transform:rotateY(90deg);opacity:0;transition:transform .5s ease,opacity .4s ease;backface-visibility:hidden}
.avatar-mbti .am-line{display:flex;gap:3px;line-height:1}
.avatar-mbti .am-line span{font-size:34px;font-weight:900}
.avatar-job{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;box-sizing:border-box;font-size:13px;font-weight:900;color:#333;line-height:1.15;transform:rotateY(90deg);opacity:0;transition:transform .5s ease,opacity .4s ease;backface-visibility:hidden}
.avatar-circle.show-mbti .avatar-image,.avatar-circle.show-job .avatar-image{transform:rotateY(90deg);opacity:0}
.avatar-circle.show-mbti .avatar-mbti{transform:rotateY(0);opacity:1}
.avatar-circle.show-job .avatar-job{transform:rotateY(0);opacity:1}
.hv-level{position:absolute;left:176px;top:44px;display:flex;align-items:baseline;gap:3px;line-height:1;z-index:2;font-size:20px}
.hv-level span{font-size:38px}
.hv-code{position:absolute;right:47px;top:39px;font-size:40px;letter-spacing:1px;line-height:1;cursor:pointer;z-index:2;display:flex;align-items:center;gap:5px} /* 数字上端がLv.数字(top44)と揃う位置：39+(50-40)/2=44 */
.streak-fire{width:50px;height:50px;object-fit:contain;display:block}
#hv-pwrdown{position:absolute;left:166px;top:153px;width:403px;text-align:center;font-size:16px;font-weight:700;color:#fff;z-index:2;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.5);transition:opacity .28s ease}
#hv-nextrev{position:absolute;left:166px;top:176px;width:403px;text-align:center;font-size:13px;font-weight:800;color:rgba(255,255,255,.92);z-index:2;cursor:pointer;text-shadow:0 1px 3px rgba(0,0,0,.5);transition:opacity .28s ease}
/* ルーム切替中に出るルーム番号の丸ページャー（復習どき/カウントダウンはフェードで隠す・選択中を中央に） */
#room-pager{position:absolute;left:0;right:0;top:150px;box-sizing:border-box;z-index:4;display:flex;gap:9px;align-items:center;overflow-x:auto;padding:5px 16px;scrollbar-width:none;opacity:0;pointer-events:none;transition:opacity .28s ease}
#room-pager::-webkit-scrollbar{display:none}
#room-pager.on{opacity:1;pointer-events:auto}
.home-wrap.pager-on #hv-pwrdown,.home-wrap.pager-on #hv-nextrev{opacity:0;pointer-events:none}
/* 丸座布団なし・数字に影のデザイン */
.rp-dot{flex:0 0 auto;min-width:30px;height:38px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;cursor:pointer;text-shadow:0 2px 4px rgba(0,0,0,.65),0 0 2px rgba(0,0,0,.55);transition:transform .18s ease}
.rp-dot.cur{transform:scale(1.55);text-shadow:0 3px 7px rgba(0,0,0,.75),0 0 3px rgba(0,0,0,.6)}
.rp-dot.pq{font-size:19px}
.home-side-btn img{width:74%;height:74%;object-fit:contain;pointer-events:none;display:block;margin:auto}
.status-panel{position:absolute;left:166px;top:83px;width:403px;height:64px;border-radius:32px;background:rgba(0,0,0,.8);z-index:1;cursor:pointer}
.hv-lab,.hv-xpg,.hv-pwrg{pointer-events:none}
.hv-lab{position:absolute;font-size:18px;line-height:19px;z-index:2}
.hv-xplabel{left:175px;top:92px;width:80px;text-align:right}
.hv-xpg{left:263px;top:92px;width:178px;height:19px}
.hv-xpval{left:450px;top:92px}
.hv-pwrlabel{left:175px;top:120px;width:80px;text-align:right}
.hv-pwrg{left:263px;top:120px;width:178px;height:19px}
.hv-pwrval{left:450px;top:120px}

.hv-roomg{left:238px;top:88px;width:89px;height:10px;padding:2px}

.rmenu-clip{position:absolute;inset:0;z-index:2;clip-path:inset(-12px 40px calc(100% - 104px) 40px round 56px)}

.slide-inner.face-pwr .hv-learned,.slide-inner.face-pwr .hv-wordsg,.slide-inner.face-pwr .hv-roompwr,.slide-inner.face-pwr .hv-roomg,.slide-inner.face-pwr .rank-b,.slide-inner.face-pwr .rank-s{transform:rotate(60deg) scale(.32);opacity:0}

.hint-badge{display:inline-block;margin-left:6px;padding:1px 6px;border:1px solid var(--line);color:var(--gold);font-size:10px;font-weight:700;vertical-align:middle}
.res-btns{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:9px;background:rgba(255,255,255,.28);border-radius:14px;padding:8px}
.res-btns .btn{padding:14px;font-size:14px}
.res-btns .full{grid-column:1/3}

/* ===== generic page (history / curve) ===== */
.page{height:100dvh;display:flex;flex-direction:column;padding:16px 16px calc(12px + env(safe-area-inset-bottom))}
.page-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.page-head h2{font-size:20px;font-weight:800;margin:0}
.back{background:rgba(0,0,0,.8);border:none;color:#fff;width:38px;height:38px;border-radius:0;font-size:18px;cursor:pointer;flex:0 0 auto}
.back:active{background:rgba(0,0,0,.65)}
.page-body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.htab{width:100%;border-collapse:collapse;font-size:15px;background:rgba(0,0,0,.35)}
.htab th,.htab td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}
.htab th{position:sticky;top:0;background:rgba(0,0,0,.8);color:#fff;font-size:12px;font-weight:800;white-space:nowrap}
.htab td.ko{font-size:18px}
.htab td:nth-child(2){font-size:16px;font-weight:700}
.htab td.num{text-align:right;font-variant-numeric:tabular-nums}
.htab tr.click{cursor:pointer}
.htab tr.click:active{background:var(--panel)}
.rate-bad{color:var(--blue)}.rate-mid{color:var(--gold)}.rate-good{color:var(--green)}
.empty{color:var(--mute);text-align:center;padding:40px 20px;line-height:1.9;font-size:14px}
.note{background:#1a1407;border:1px solid #3a2e0a;border-radius:0;padding:11px 13px;font-size:12.5px;color:#e8c878;line-height:1.6;margin:10px 0}
.curve-stats{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.cstat{flex:1 1 44%;background:rgba(0,0,0,.8);border:none;border-radius:0;padding:12px}
.cstat .k{color:var(--mute);font-size:11px;font-weight:700}
.cstat .v{font-size:17px;font-weight:800;margin-top:3px}
.chartbox{background:rgba(0,0,0,.8);border:1px solid var(--line);border-radius:0;padding:14px 10px 8px}
.chartbox polyline.grow{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 1.1s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
/* 記憶コンディション・タブ */
.cond{flex:0 0 auto;text-align:center;padding:4px 0 8px}
.cond-k{color:var(--mute);font-size:11px;font-weight:800;letter-spacing:2px}
.cond-v{font-size:40px;font-weight:900;line-height:1.1}
.cond-v span{font-size:16px;color:var(--mute);font-weight:800}
.cond-sub{color:var(--mute);font-size:12px;font-weight:700;margin-top:2px}
.mpanel{background:rgba(0,0,0,.8);padding:10px 14px 12px;margin-bottom:12px}
.mpanel .cs-head{margin-bottom:6px}
.curve-words{background:rgba(0,0,0,.35)}
.curve-words .wl-ko{font-size:30px}
.curve-words .wl-ja{font-size:19px}
.curve-words .wl-no{flex:0 0 36px;font-size:12px}
.curve-words .wl-rate{flex:0 0 40px;font-size:14px}
.curve-words .wl-row{padding:8px 10px}
.curve-scroll{flex:1;min-height:0;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scrollbar-width:none}
.curve-scroll::-webkit-scrollbar{display:none}
.curve-slide{flex:0 0 100%;width:100%;scroll-snap-align:start;overflow-y:auto;padding:0 16px 24px;box-sizing:border-box;-webkit-overflow-scrolling:touch}
.cs-head{font-size:20px;font-weight:900;letter-spacing:2px;margin:2px 0 8px}
.pwrline{display:flex;align-items:center;justify-content:center;gap:12px}
.pwr-lab,.pwr-val{font-size:22px;font-weight:900;line-height:1}
.pwr-g{width:210px;height:19px;background:#333;border-radius:999px;padding:3px;box-sizing:border-box}
.pwr-g div{height:100%;border-radius:999px}
.cond-sub b{color:var(--green)}
.tabs{flex:0 0 auto;display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;background:var(--gray);border:1px solid var(--line);color:var(--mute);font-size:12px;font-weight:700;padding:8px 11px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--text);color:#000;border-color:var(--text)}
.ms-stable{color:var(--green)}.ms-review{color:var(--gold)}.ms-urgent{color:#ff6b6b}
.catbar{height:6px;background:var(--gray);width:90px;max-width:30vw}
.catbar-f{height:100%}
.catbar-f.ms-stable{background:var(--green)}.catbar-f.ms-review{background:var(--gold)}.catbar-f.ms-urgent{background:#ff6b6b}
.bignote{background:var(--panel);border:1px solid var(--line);padding:14px;text-align:center;font-size:14px;line-height:1.8;font-weight:700;margin-bottom:12px}
.bignote b{color:var(--green);font-size:18px}
.bignote .improve{color:var(--green);font-weight:800}
#s-wdetail .htab th,#s-wdetail .htab td{padding:6px 4px}
#s-wdetail .htab td:first-child{font-size:11px;color:var(--faint)}
.dicon{width:20px;height:20px;vertical-align:-4px;margin-right:2px}
.wd-scroll{flex:1;min-height:0;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scrollbar-width:none}
.wd-scroll::-webkit-scrollbar{display:none}
.wd-slide{flex:0 0 100%;width:100%;scroll-snap-align:start;overflow-y:auto;padding:4px 16px 24px;box-sizing:border-box;-webkit-overflow-scrolling:touch}
.wd-top{display:flex;justify-content:center;align-items:baseline;gap:22px;font-size:19px;font-weight:900;margin:2px 0 4px}
/* 単語詳細：カード型（画像左・小さめ／右に韓国語＋日本語） */
.wd-card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.14);border-radius:20px;padding:16px;margin:4px 16px 2px}
.wd-cimg{position:relative;flex:0 0 auto;width:118px;height:118px}
.wd-cimg .wd-img2{width:100%;height:100%;object-fit:contain}
.wd-cimg .wd-img2.noimg{display:flex;align-items:center;justify-content:center;font-size:52px}
.wd-cimg .wd-spk{position:absolute;top:-4px;right:-4px;margin:0;background:rgba(0,0,0,.5)}
.wd-cinfo{flex:1;min-width:0}
.wd-cmeta{display:flex;gap:14px;font-size:15px;font-weight:900;margin-bottom:4px}
/* 単語詳細 上部ページャー（番号＋韓国語。横スクロールのみ・見切れ防止で縦幅を確保） */
.rp-pager{flex:0 0 auto;display:flex;gap:12px;align-items:center;overflow-x:auto;overflow-y:hidden;touch-action:pan-x;scrollbar-width:none;padding:14px 16px 12px}
.rp-pager::-webkit-scrollbar{display:none}
.rp-pager .wd-dot{flex:0 0 auto;flex-direction:column;gap:1px;min-width:auto;height:auto}
.rp-pager .wd-dn{font-size:12px;font-weight:800;opacity:.85;line-height:1}
.rp-pager .wd-dk{font-size:16px;font-weight:900;white-space:nowrap;line-height:1.1}
.wd-ko2{text-align:left;font-size:34px;font-weight:800;line-height:1.1}
.wd-ja2{text-align:left;font-size:19px;font-weight:800;color:rgba(255,255,255,.92);margin-top:3px}
.wd-spk{background:rgba(0,0,0,.35);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;margin-left:10px;vertical-align:middle;cursor:pointer;color:#fff}
.wd-ex{margin:10px 16px 0;background:rgba(255,255,255,.14);border-radius:12px;padding:10px 14px;text-align:center}
.wd-ex-ko{font-size:19px;font-weight:800}
.wd-ex-ja{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);margin-top:3px}
.wdetail-head{margin-bottom:6px}
.wd-line{display:flex;justify-content:space-between;align-items:baseline;gap:12px} /* 韓国語=左端 / 日本語=右端 */
.wd-line .ja{text-align:right}
.wdetail-head .ko{font-size:26px;font-weight:800}
.wdetail-head .ja{color:#FFFFFF;font-size:26px;font-weight:800;margin-top:2px}

/* ============================================================ 特別ルーム「プリQQ」専用テーマ（#s-priqq配下だけ・通常ルームに影響なし。フォントは変更しない） ============================================================ */
#s-priqq{background:linear-gradient(180deg,#ffe3f1 0%,#ffeaf5 30%,#eef4ff 70%,#f3ecff 100%);color:#6a3d63;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(24px + env(safe-area-inset-bottom))}
#s-priqq *{box-sizing:border-box}
@keyframes pqRainbow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes pqTwinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
@keyframes pqFloat{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}50%{transform:translateY(-8px) rotate(var(--rot,0deg))}}
@keyframes pqShine{0%{transform:translateX(-120%) skewX(-20deg)}60%,100%{transform:translateX(220%) skewX(-20deg)}}
@keyframes pqPop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
/* 戻る（ぷっくり丸ボタン） */
.pq-back{position:absolute;left:14px;top:14px;z-index:6;width:46px;height:46px;border:none;border-radius:50%;background:#fff;color:#ff77aa;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #ffcfe3,0 6px 12px rgba(255,120,170,.3);line-height:1}
.pq-back:active{transform:translateY(2px);box-shadow:0 2px 0 #ffcfe3}
/* メインビジュアル（ガーリー・アーティストビジュアル風。実在アーティストの複製ではない抽象コンポジション） */
.pq-hero{position:relative;height:290px;margin:0;overflow:hidden;border-radius:0 0 34px 34px;
  background:linear-gradient(115deg,#ffd6ec,#d9e6ff,#e7d6ff,#ffe0f0,#d6f0ff,#ffd6ec);background-size:200% 200%;animation:pqRainbow 14s linear infinite alternate}
.pq-hero .pq-spot{position:absolute;left:50%;top:-40%;width:120%;height:150%;transform:translateX(-50%);
  background:radial-gradient(ellipse at center,rgba(255,255,255,.85),rgba(255,255,255,0) 60%)}
.pq-hero .pq-rays{position:absolute;left:50%;top:44%;width:520px;height:520px;transform:translate(-50%,-50%);
  background:conic-gradient(from 0deg,rgba(255,255,255,.55) 0 6deg,rgba(255,255,255,0) 6deg 30deg);opacity:.5;border-radius:50%;animation:pqRainbow 30s linear infinite}
.pq-star,.pq-heart-f{position:absolute;animation:pqTwinkle 2.4s ease-in-out infinite}
.pq-sil{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:230px;height:250px;filter:drop-shadow(0 6px 14px rgba(255,120,170,.35))}
.pq-ribbon{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:3;background:linear-gradient(90deg,#ff8fbf,#ff77aa);color:#fff;
  padding:9px 26px;border-radius:999px;font-size:22px;font-weight:900;letter-spacing:1px;white-space:nowrap;box-shadow:0 5px 0 #e85f92,0 10px 18px rgba(232,95,146,.4);text-shadow:0 1px 2px rgba(0,0,0,.15)}
.pq-ribbon::before,.pq-ribbon::after{content:"";position:absolute;top:50%;width:16px;height:22px;background:#ff77aa;transform:translateY(-50%);z-index:-1}
.pq-ribbon::before{left:-8px;clip-path:polygon(100% 0,0 50%,100% 100%)}
.pq-ribbon::after{right:-8px;clip-path:polygon(0 0,100% 50%,0 100%)}
.pq-special{position:absolute;right:18px;top:16px;z-index:4;background:#fff;color:#c04ea0;font-size:12px;font-weight:900;letter-spacing:2px;
  padding:6px 12px;border-radius:12px;transform:rotate(8deg);box-shadow:0 3px 0 #ffd0ea,0 6px 12px rgba(192,78,160,.3);border:2px dashed #ffa8d6}
.pq-special .pq-sparkle{color:#ffcf3f}
/* 本文 */
.pq-body{padding:16px 18px 0;position:relative}
.pq-title{text-align:center;font-size:26px;font-weight:900;color:#ff5fa0;text-shadow:0 2px 0 #fff,0 3px 6px rgba(255,120,170,.25);margin-top:6px}
.pq-desc{text-align:center;font-size:13.5px;font-weight:700;color:#8a6a86;line-height:1.8;margin:8px 14px 0}
/* 進捗（ハート入りぷっくりバー） */
.pq-prog{margin:16px auto 0;max-width:420px;background:rgba(255,255,255,.7);border-radius:20px;padding:12px 16px;box-shadow:0 4px 0 rgba(255,175,210,.4),inset 0 0 0 2px #fff}
.pq-prog-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:900;color:#c04ea0}
.pq-prog-bar{margin-top:8px;height:16px;border-radius:999px;background:#ffe1ee;overflow:hidden;position:relative;box-shadow:inset 0 2px 4px rgba(232,95,146,.15)}
.pq-prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#ff9ecb,#c9a8ff,#9ecbff);background-size:200% 100%;animation:pqRainbow 8s linear infinite alternate}
/* 単語プレビュー（ステッカー風・ぷっくりカード） */
.pq-sec-h{display:flex;align-items:center;gap:8px;justify-content:center;margin:20px 0 10px;font-size:15px;font-weight:900;color:#b34d94}
.pq-preview{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:460px;margin:0 auto}
.pq-card{position:relative;background:#fff;border-radius:22px;padding:14px 14px 12px;text-align:center;overflow:hidden;
  box-shadow:0 5px 0 rgba(255,175,210,.45),0 10px 18px rgba(255,120,170,.18);border:2px solid #ffe3f1}
.pq-card:nth-child(3n+2){border-color:#dce8ff}
.pq-card:nth-child(3n){border-color:#e9def9}
.pq-card .pq-sticker{position:absolute;top:6px;right:8px;font-size:16px;animation:pqFloat 3.2s ease-in-out infinite}
.pq-card .pq-ko{font-size:24px;font-weight:900;color:#5b3f57;line-height:1.2}
.pq-card .pq-ja{font-size:12.5px;font-weight:800;color:#a07fa0;margin-top:3px}
.pq-card .pq-shine{position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.7),rgba(255,255,255,0));animation:pqShine 5.5s ease-in-out infinite}
/* ボタン（大きくぷっくり） */
.pq-btns{max-width:460px;margin:22px auto 0;display:flex;flex-direction:column;gap:12px;padding:0 4px}
.pq-btn{border:none;border-radius:26px;padding:18px;font-size:19px;font-weight:900;cursor:pointer;letter-spacing:1px;position:relative;overflow:hidden}
.pq-btn.start{color:#fff;background:linear-gradient(90deg,#ff9ecb,#ff77aa,#c9a8ff,#9ecbff,#ff9ecb);background-size:250% 100%;animation:pqRainbow 9s linear infinite;box-shadow:0 6px 0 #e85f92,0 12px 22px rgba(232,95,146,.4)}
.pq-btn.start:active{transform:translateY(3px);box-shadow:0 3px 0 #e85f92}
.pq-btn.review{color:#8a5bd0;background:#fff;box-shadow:0 5px 0 #e3d6ff,0 10px 18px rgba(150,120,230,.25);border:2px solid #e3d6ff}
.pq-btn.review:active{transform:translateY(2px);box-shadow:0 2px 0 #e3d6ff}
.pq-btn .pq-shine{position:absolute;top:0;left:0;width:35%;height:100%;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.6),rgba(255,255,255,0));animation:pqShine 4.5s ease-in-out infinite}
/* トースト */
.pq-toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:500;background:#fff;color:#ff5fa0;font-size:14px;font-weight:900;
  padding:12px 22px;border-radius:999px;box-shadow:0 6px 16px rgba(255,120,170,.4);border:2px solid #ffd0ea;animation:pqPop .3s ease}
/* ROOM一覧マップの特別エントリ */
.rm-special{grid-column:1/-1;border:none;border-radius:18px;padding:12px;cursor:pointer;font-family:inherit;font-weight:900;font-size:15px;color:#fff;
  background:linear-gradient(90deg,#ff9ecb,#ff77aa,#c9a8ff,#9ecbff,#ff9ecb);background-size:250% 100%;animation:pqRainbow 9s linear infinite;
  box-shadow:0 4px 0 #e85f92;display:flex;align-items:center;justify-content:center;gap:8px}

/* カルーセル内の特別ルームスライド（通常ROOMのレイアウトを流用しつつプリティー化。位置クラスはそのまま） */
.pq-slide .rmenu-bg{background:rgba(255,255,255,.55);box-shadow:inset 0 0 0 3px #ffb3d9,0 6px 14px rgba(255,120,170,.25)}
.pq-slide .hv-roomlabel{color:#ff5fa0;text-shadow:0 2px 0 #fff}
.pq-slide .hv-roomno{color:#ff5fa0 !important;font-size:40px;top:44px;text-shadow:0 2px 0 #fff,0 3px 8px rgba(255,120,170,.3)}
.pq-slide .hv-learned,.pq-slide .hv-roompwr{color:#c04ea0}
.pq-slide .hv-wordsg,.pq-slide .hv-roomg{background:#ffe1ee}
.pq-slide .hv-wordsg .gfill{background:linear-gradient(90deg,#ff9ecb,#c9a8ff)!important}
.pq-slide .hv-roomg .gfill{background:linear-gradient(90deg,#ff77aa,#9ecbff)!important}
.pq-slide .pq-badge{position:absolute;left:363px;top:70px;z-index:2;background:#fff;color:#c04ea0;font-size:12px;font-weight:900;letter-spacing:1px;padding:6px 12px;border-radius:12px;transform:rotate(8deg);box-shadow:0 3px 0 #ffd0ea;border:2px dashed #ffa8d6}
/* 特別ルームのメイン画像部分（ジオラマの代わりのプリティー・ミニビジュアル） */
.pq-main{position:absolute;left:24px;top:120px;width:554px;height:507px;border-radius:34px;overflow:hidden;z-index:1;
  background:linear-gradient(115deg,#ffd6ec,#d9e6ff,#e7d6ff,#ffe0f0,#d6f0ff,#ffd6ec);background-size:200% 200%;animation:pqRainbow 14s linear infinite alternate;
  box-shadow:inset 0 0 0 4px #fff,0 8px 22px rgba(255,120,170,.25)}
.pq-main .pq-spot{border-radius:34px}
.pq-main .pq-sil{width:260px;height:280px}
.pq-main .pq-ribbon{bottom:26px}
.pq-cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:30px} /* 差し替え画像（ジャケット風フレーム内） */
.pq-hero .pq-cover{border-radius:0 0 34px 34px}
/* プリQQの出題/結果画面のピンクテーマ（背景を変え、白文字は黒影で読みやすく） */
#s-quiz.pq,#s-result.pq{background:linear-gradient(180deg,#ffe3f1,#ffeaf5 40%,#eef4ff 100%)}
#s-quiz.pq .qbar,#s-quiz.pq .qadv{text-shadow:0 1px 3px rgba(0,0,0,.5)}
#s-quiz.pq .qsw{box-shadow:0 1px 3px rgba(0,0,0,.25)}
/* プリQQの結果画面：白文字はピンク背景で埋もれるので、下敷きを濃い白に・文字を濃色にして読みやすく */
#s-result.pq .res-head,#s-result.pq .res-btns{background:rgba(255,255,255,.88);box-shadow:0 2px 10px rgba(214,120,175,.28)}
#s-result.pq .res-score,#s-result.pq .pwr-lab,#s-result.pq .pwr-val{color:#4a2e46}
#s-result.pq .res-score span{color:#8a6f83}
#s-result.pq .res-cheer{color:#b23a86;text-shadow:none}
#s-result.pq .res-btns .btn.line,#s-result.pq .res-btns .btn.wt{background:#3a2b36;color:#fff;border-color:#3a2b36}
/* 特別ルーム選択中のスタートボタン（グローバルボタンをプリティーに） */
.home-wrap.pq-active .start-button{border:none!important;color:#fff!important;
  background:linear-gradient(90deg,#ff9ecb,#ff77aa,#c9a8ff,#9ecbff,#ff9ecb)!important;background-size:250% 100%!important;animation:pqRainbow 9s linear infinite;
  box-shadow:0 8px 0 #e85f92,0 16px 26px rgba(232,95,146,.4)!important;border-radius:62px}
/* 詳細ページのプレビューカードを豪華枠に（白カード＋ゴールド/レインボー枠） */
.pq-card{background:linear-gradient(#fff,#fff) padding-box,linear-gradient(135deg,#ffd84d,#ff9ecb,#9ecbff,#c9a8ff) border-box;border:3px solid transparent;box-shadow:0 5px 0 rgba(255,175,210,.45),0 10px 20px rgba(255,120,170,.2),inset 0 0 0 2px #fff}
.pq-card:nth-child(3n+2),.pq-card:nth-child(3n){border:3px solid transparent}
/* ============================================================ 歯車モード ============================================================ */
/* スタートボタン右端の⚙バッジ（歯車モードON時のみ・ゆっくり回転） */
.start-button .sb-gear{display:none;position:absolute;right:20px;top:50%;font-size:34px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));animation:gearspin 7s linear infinite;pointer-events:none}
.start-button.gearmode .sb-gear{display:block}
@keyframes gearspin{from{transform:translateY(-50%) rotate(0)}to{transform:translateY(-50%) rotate(360deg)}}
.gear-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:0 8px}
.gear-hint{font-size:14px;font-weight:800;color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.5);letter-spacing:.5px;margin-bottom:10px}
/* 盤面：中央にダイヤル、上下左右に日本語。--gsは歯車（円）の直径 */
.gear-board{position:relative;width:min(96vw,58vh);aspect-ratio:1;--gs:min(38vw,24vh);flex:0 0 auto}
.gear-ja{position:absolute;background:rgba(0,0,0,.8);color:#fff;font-weight:800;font-size:clamp(12px,3.4vw,15px);line-height:1.25;padding:8px 11px;border-radius:16px;max-width:44%;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:2;pointer-events:none;transition:background .3s ease,box-shadow .3s ease;box-sizing:border-box}
.gear-ja.jt{left:50%;top:0;transform:translateX(-50%)}
.gear-ja.jr{right:0;top:50%;transform:translateY(-50%)}
.gear-ja.jb{left:50%;bottom:0;transform:translateX(-50%)}
.gear-ja.jl{left:0;top:50%;transform:translateY(-50%)}
/* 左右は横幅が狭いので折り返しを許可（歯車と重ならない幅に制限） */
.gear-ja.jr,.gear-ja.jl{max-width:23%;white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word}
.gear-ja.hit{background:#1FAD62;box-shadow:0 0 16px 3px rgba(31,173,98,.75)}
/* ダイヤル本体（タップで90°ずつ回転） */
.gear-dial{position:absolute;left:50%;top:50%;width:var(--gs);height:var(--gs);margin:calc(var(--gs)/-2) 0 0 calc(var(--gs)/-2);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.gear-dial:active .gear-body{filter:brightness(.96)}
.gear-body{position:absolute;inset:0;transition:transform .5s cubic-bezier(.34,1.4,.5,1);will-change:transform}
.gear-core{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 34% 28%,#fff,#f3f3f3 58%,#dfdfdf);box-shadow:0 6px 18px rgba(0,0,0,.3),inset 0 0 0 4px rgba(0,0,0,.05)}
/* 歯（4枚）。丸の外へ張り出す座布団に韓国語を載せる */
.gear-tooth{position:absolute;left:50%;top:50%;width:calc(var(--gs)*.46);height:calc(var(--gs)*.40);margin:calc(var(--gs)*-.20) 0 0 calc(var(--gs)*-.23);border-radius:16px;background:linear-gradient(180deg,#fff,#f0f0f0);box-shadow:0 3px 9px rgba(0,0,0,.16),inset 0 0 0 2px rgba(0,0,0,.04)}
.gear-ko{position:absolute;left:50%;top:50%;width:calc(var(--gs)*.42);margin:calc(var(--gs)*-.04) 0 0 calc(var(--gs)*-.21);text-align:center;font-size:clamp(12px,3.5vw,15px);font-weight:900;color:#333;line-height:1.15;word-break:break-all;transition:transform .5s cubic-bezier(.34,1.4,.5,1);will-change:transform;pointer-events:none}
/* 中央ハブ：黄色の回転つまみ（タップ誘導の⟳付き） */
.gear-hub{position:absolute;left:50%;top:50%;width:calc(var(--gs)*.34);height:calc(var(--gs)*.34);margin:calc(var(--gs)*-.17) 0 0 calc(var(--gs)*-.17);border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFD84D,#FFC400 62%,#e0a800);box-shadow:inset 0 -3px 7px rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.24);display:flex;align-items:center;justify-content:center;font-size:calc(var(--gs)*.15);font-weight:900;color:#5a4300;z-index:3;pointer-events:none}
/* 回答ボタン：スタートボタンと同系の黄枠ピル */
.gear-answer{display:block;margin:16px auto 0;width:min(300px,78vw);background:rgba(0,0,0,.85);border:4px solid #FFC400;border-radius:999px;color:#fff;font-size:20px;font-weight:900;letter-spacing:8px;text-indent:8px;padding:15px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);font-family:inherit;transition:transform .08s ease,opacity .2s ease}
.gear-answer:active{transform:scale(.96)}
.gear-answer:disabled{opacity:.45;pointer-events:none}
.gear-bottom{padding:0 18px calc(18px + env(safe-area-inset-bottom))}
/* 歯車モード結果 */
.gres{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}

.gres-score{font-size:64px;font-weight:900;color:#fff;text-shadow:0 3px 8px rgba(0,0,0,.5);line-height:1.15}
.gres-score small{font-size:26px;font-weight:800;opacity:.85}
.gres-dots{display:flex;gap:10px;margin:10px 0 6px}
.gres-dots i{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.35);box-shadow:0 1px 4px rgba(0,0,0,.25)}

/* n番目の曜日(weekday:0=日)の日付。可変祝日用 */
function nthWeekday(y,m,wd,n){let d=new Date(y,m,1),c=0;while(d.getMonth()===m){if(d.getDay()===wd){c++;if(c===n)return new Date(d);}d.setDate(d.getDate()+1);}return null;}
/* その日にかかわる特別ボーナス（無ければnull） */
function specialBonusFor(dt){
  const y=dt.getFullYear(),m=dt.getMonth(),day=dt.getDate();
  const eq=d=>d&&d.getMonth()===m&&d.getDate()===day;
  if(m===0&&day===1)return{name:"元日",amount:300};
  if(m===1&&day===14)return{name:"バレンタイン",amount:150};
  if(m===2&&day===3)return{name:"ひな祭り",amount:150};
  if(eq(nthWeekday(y,4,0,2)))return{name:"母の日",amount:200};
  if(m===4&&day===5)return{name:"こどもの日",amount:150};
  if(eq(nthWeekday(y,5,0,3)))return{name:"父の日",amount:200};
  if(eq(nthWeekday(y,6,1,3)))return{name:"海の日",amount:200};
  if(m===6&&day===7)return{name:"七夕",amount:150};
  if(m===9&&day===31)return{name:"ハロウィン",amount:200};
  if(m===11&&(day===24||day===25))return{name:"クリスマス",amount:300};
  if(m===11&&day===31)return{name:"大晦日",amount:200};
  return null;
}

/* その日に「12問を完了したテスト」の回数（履歴からtestIdごと12件以上を完了とみなす） */
function doneCountByDay(){
  const by={};loadHistory().forEach(r=>{if(r.testId)(by[r.testId]=by[r.testId]||[]).push(r);});
  const m={};
  Object.values(by).forEach(arr=>{if(arr.length>=12){const t=arr[arr.length-1].answeredAt;if(t){const k=dayKey(new Date(t).getTime());m[k]=(m[k]||0)+1;}}});
  return m;
}
/* 連続学習日数：12問を完了した日が連続している数（起動だけではカウントしない） */
function loginStreak(){
  const s=new Set(Object.keys(doneCountByDay()));const d=new Date();
  if(!s.has(dayKey(d.getTime())))d.setDate(d.getDate()-1); // 今日まだ未完了なら昨日から数える（今日やれば+1）
  let n=0,grace=false;
  for(;;){
    if(s.has(dayKey(d.getTime()))){n++;d.setDate(d.getDate()-1);continue;}
    if(!grace&&n>0){ // ストリーク保険：1日だけの途切れは継続扱い（1ストリークにつき1回）
      const d2=new Date(d);d2.setDate(d2.getDate()-1);
      if(s.has(dayKey(d2.getTime()))){grace=true;d.setDate(d.getDate()-1);continue;}
    }
    break;
  }
  return n;
}

/* 回答履歴の間引き：90日より古い明細を削除（テスト数だけメタに繰入れ）。localStorage肥大と全走査の劣化を防ぐ */
function pruneHistory(){
  try{
    const KEY="kwt_histprune_v1",today=dayKey(Date.now());
    if(localStorage.getItem(KEY)===today)return; // 1日1回だけ
    localStorage.setItem(KEY,today);
    const h=loadHistory();if(h.length<2000)return; // 少量なら触らない
    const cutoff=Date.now()-90*86400000;
    const keep=h.filter(r=>new Date(r.answeredAt).getTime()>=cutoff);
    if(keep.length===h.length)return;
    const droppedTests=new Set(h.filter(r=>new Date(r.answeredAt).getTime()<cutoff).map(r=>r.testId)).size;
    const meta=JSON.parse(localStorage.getItem("kwt_histmeta_v1")||"{}");
    meta.prunedTests=(meta.prunedTests||0)+droppedTests;
    localStorage.setItem("kwt_histmeta_v1",JSON.stringify(meta));
    localStorage.setItem(LS_HIST,JSON.stringify(keep));_histIdxCache=null;
  }catch(e){}
}

function pwrOverallExact(){const s=loadStats(),ids=Object.keys(s);if(!ids.length)return 0;const now=Date.now();let t=0;ids.forEach(id=>t+=displayMemoryScore(getStat(id,s),now));return t/ids.length;}

  num.textContent=v.toFixed(2)+"%"; // 数値は実PWRを0.01%桁で表示（バーはCSSで最大→0を徐々に繰り返しドレイン）

function syncRoomPager(){
  const p=document.getElementById("room-pager");if(!p||!p.children.length)return;
  const el=document.getElementById("hv-rooms");

  const frac=el?Math.min(Math.max(el.scrollLeft/602,0),max):(_onSpecial?1:curSection+1); // 連続値（0=難易度,1=特別,2=ROOM1…）
  const dotPos=Math.max(0,frac-1); // ドット連続位置（0=特別/pq, 1=ROOM1…）。左右スワイプ中も滑らかに追従
  const near=Math.round(dotPos); // 最寄りドットをハイライト
  [...p.children].forEach((d,i)=>d.classList.toggle("cur",i===near));
  // 隣り合うドットのoffsetLeftを線形補間して連続的に中央寄せ（〇がスクロールに連動）
  const lo=Math.max(0,Math.min(p.children.length-1,Math.floor(dotPos))),hi=Math.min(p.children.length-1,lo+1);
  const a=p.children[lo],b=p.children[hi];if(!a)return;
  const center=(el2)=>el2.offsetLeft+el2.offsetWidth/2;
  const c=center(a)+(center(b)-center(a))*(dotPos-lo);
  p.scrollLeft=c-p.clientWidth/2;
}

let _recoTimer=null,_recoFace=0,_recoIdx=0;
function pickRecoWord(n){
  const ids=(n==="pq")?PRIQQ.ids:(LEVEL_SECTIONS[curLevel][n]||[]);
  if(!ids||!ids.length)return null;
  const st=loadStats(),now=Date.now();
  const due=ids.filter(id=>{const s=st[id];return s&&s.nextReviewAt&&new Date(s.nextReviewAt).getTime()<=now;}); // 復習どき優先
  const unseen=ids.filter(id=>{const s=st[id];return !s||!s.hasSeen;}); // 次に未学習
  const pool=due.length?due:(unseen.length?unseen:ids);
  const id=pool[_recoIdx%pool.length];_recoIdx++;
  return WORD_BY_ID[id]||null;
}

  return Object.values(byTest).map(a=>({at:a[a.length-1].answeredAt,total:Math.round(a.reduce((x,r)=>x+(r.score||0),0))}))

/* バックアップの穏やかなリマインド */
function maybeBackupNag(){
  try{
    if(loadHistory().length<500)return;
    const now=Date.now();
    const last=localStorage.getItem("kwt_lastbackup_v1");
    if(last&&now-new Date(last).getTime()<21*86400000)return;
    const nag=localStorage.getItem("kwt_backupnag_v1");
    if(nag&&now-new Date(nag).getTime()<7*86400000)return;
    localStorage.setItem("kwt_backupnag_v1",new Date().toISOString());
    const wrap=document.getElementById("homewrap");if(!wrap)return;
    const el=document.createElement("div");el.className="home-toast";el.textContent="💾 設定からデータのバックアップができます";
    wrap.appendChild(el);
    setTimeout(()=>{el.classList.add("out");setTimeout(()=>el.remove(),450);},3500);
  }catch(e){}
}

  const ids=LEVEL_SECTIONS[curLevel][n]||[],s=loadStats(),now=Date.now();
  const learned=ids.filter(id=>s[id]&&s[id].reviewCount>0);
  let pw=0;ids.forEach(id=>pw+=displayScore(getStat(id,s),now)); // ステータスと同じ「ROOM全単語平均（未学習=0）」
  const rec=loadSections()[curLevel+"-"+String(n).padStart(2,"0")]||{};
  return{learned:learned.length,total:ids.length||1,pwr:ids.length?Math.round(pw/ids.length):0,
    recent:(rec.recentRanks||[]).slice(-3),best:rec.bestRank||null};

    let _ty=null,_tx=null,_plList=null,_plBase=null,_homeDir=null;

/* 602px基準で比例スケール（PCは等倍上限・中央寄せ） */
function scaleHome(){
  const el=document.getElementById("homewrap");if(!el)return;
  // 機種ごとに幅・高さ（セーフエリア控除後）の両方に収まるスケールを採用（下詰まり防止）
  const app=document.querySelector(".app");
  const cs=app?getComputedStyle(app):null;
  const padV=cs?((parseFloat(cs.paddingTop)||0)+(parseFloat(cs.paddingBottom)||0)):0;
  // iOS Safariの下部ツールバー(フッター)を考慮: visualViewportの実高さ−安全マージン12px
  const vvh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight||1178;
  // 広告フッター表示中はその高さ分だけ縮めて、スタートボタンが隠れないようにする
  const adf=document.getElementById("ad-footer");
  const adH=(adf&&document.body.classList.contains("has-adfooter"))?adf.offsetHeight:0;
  const availH=Math.max(300,vvh-padV-12-adH);
  const appW=app?app.clientWidth:Math.min(window.innerWidth||602,602);
  const s=Math.min(appW/602,availH/1178,1);
  el.style.transform=`scale(${s})`; // #s-homeのjustify-content:center+origin:top centerで水平中央は自動
  el.style.setProperty("--inv",String(1/s)); // スケール補正係数（ステータス内をPWR詳細ページと同じ実寸にする）
  el.style.marginBottom=`-${Math.round(1178*(1-s))}px`; // transformはレイアウト高を変えないため余白を回収
}

/* 「復習どき」タップ：期限が来ている単語だけで復習テストを開始（優先度順に12語） */
function startDueReview(){
  const s=loadStats(),now=Date.now(),due=[];
  Object.keys(s).forEach(id=>{
    const st=s[id];
    if(st&&st.hasSeen&&st.nextReviewAt&&new Date(st.nextReviewAt).getTime()<=now&&WORD_BY_ID[id])
      due.push({id,ps:priorityScore(WORD_BY_ID[id],st,now)});
  });
  if(!due.length)return; // 待機なし（表示も出ていない）
  due.sort((a,b)=>b.ps-a.ps);
  startTest(due.slice(0,12).map(x=>x.id));
}

/* 今日学ぶべき単語の帯：忘却が進みPWR回復効率が高い語（urgent/review）を優先度順に12語流す */
function buildTodayBand(){
  const band=document.getElementById("today-band"),track=document.getElementById("tb-track");
  if(!band||!track)return;
  const stats=loadStats(),now=Date.now();
  const all=Object.keys(stats).map(id=>{
    const w=WORD_BY_ID[id];if(!w)return null;
    const st=getStat(id,stats);
    return{w,st,state:wordState(st,now),ps:priorityScore(w,st,now)};
  }).filter(Boolean);
  // PWR回復効率が高いurgent/reviewを最優先。12語に満たなければ他の学習済み語を優先度順に補充
  const pri=all.filter(x=>x.state==="urgent"||x.state==="review").sort((a,b)=>b.ps-a.ps);
  let picks=pri.slice(0,12);
  if(picks.length<12){
    const ids=new Set(picks.map(x=>x.w.id));
    picks=picks.concat(all.filter(x=>!ids.has(x.w.id)).sort((a,b)=>b.ps-a.ps).slice(0,12-picks.length));
  }
  if(!picks.length){band.style.display="none";_tbKey="";return;}
  band.style.display="block";
  const key=picks.map(x=>x.w.id).join(",");
  if(key===_tbKey&&track.childElementCount)return; // 内容が同じなら作り直さない（アニメーションを途切れさせない）
  _tbKey=key;
  // 語数が少ないとグループ幅<帯幅でループが破綻するため、8枚になるまで循環リピートして密度を確保
  const list=picks.slice();
  for(let i=0;list.length<8;i++)list.push(picks[i%picks.length]);
  const cards=list.map(x=>{
    const img=(typeof WORD_IMG!=="undefined"&&WORD_IMG[x.w.ko])?`<span class="tb-imgspace"></span><img class="tb-img" src="${WORD_IMG[x.w.ko]}" loading="lazy" alt="">`:"";
    return `<div class="tb-card" onclick="renderWordDetail(${x.w.id},'room')">${img}<div class="tb-ko">${esc(x.w.ko)}</div><div class="tb-ja">${esc(x.w.ja)}</div></div>`;
  }).join("");
  track.innerHTML=`<div class="tb-group">${cards}</div><div class="tb-group">${cards}</div>`; // 同一グループ2連結
}
let _tbKey="";

/* --- 書き取り誤答の分類（初声・中声・終声に分解して差分判定） --- */
const KO_INDEX={};Object.values(WORD_BY_ID).forEach(w=>{KO_INDEX[w.ko.replace(/[\s~〜・･]/g,"")]=w;});
const TENSE_GROUPS=[["ㄱ","ㅋ","ㄲ"],["ㄷ","ㅌ","ㄸ"],["ㅂ","ㅍ","ㅃ"],["ㅈ","ㅊ","ㅉ"],["ㅅ","ㅆ"]];
const COMPOUND_V=new Set(["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"]);
function _decompSyl(ch){const c=ch.codePointAt(0);if(c<0xAC00||c>0xD7A3)return null;const s=c-0xAC00;return{cho:CHO[Math.floor(s/588)],jung:JUNG[Math.floor((s%588)/28)],jong:JONG[s%28]||""};}
function _sameTense(a,b){return TENSE_GROUPS.some(g=>g.includes(a)&&g.includes(b));}
function _lev(a,b){const m=a.length,n=b.length,D=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
 for(let j=0;j<=n;j++)D[0][j]=j;
 for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)D[i][j]=Math.min(D[i-1][j]+1,D[i][j-1]+1,D[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
 return D[m][n];}
function phoneticDetail(inp,cor){
  const A=[...inp],B=[...cor],L=Math.min(A.length,B.length),found=[];
  for(let i=0;i<L;i++){
    if(A[i]===B[i])continue;
    const a=_decompSyl(A[i]),b=_decompSyl(B[i]);if(!a||!b)continue;
    const dc=a.cho!==b.cho,dv=a.jung!==b.jung,dj=a.jong!==b.jong;
    if(dc&&!dv&&!dj)found.push(_sameTense(a.cho,b.cho)?"tense_aspirated_confusion":"initial_consonant_confusion");
    else if(dv&&!dc&&!dj)found.push((COMPOUND_V.has(a.jung)||COMPOUND_V.has(b.jung))?"compound_vowel_confusion":"vowel_confusion");
    else if(dj&&!dc&&!dv)found.push("final_consonant_confusion");
  }
  const pri=["tense_aspirated_confusion","compound_vowel_confusion","final_consonant_confusion","vowel_confusion","initial_consonant_confusion"];
  return pri.find(p=>found.includes(p))||null;
}
/* ユーザー向け「おしい！」判定: 音節数が同じで、各相違が「終声だけ/母音だけ/濃音・激音の初声だけ」の単一要素ミス(最大2音節)のときのみtrue。
   編集距離では音が全然違っても近いと誤判定するため、音の近さを厳密に見る */
function isPhoneticCloseMiss(input,cor){
  const norm=s=>String(s||"").replace(/[\s~〜・･]/g,"");
  const A=[...norm(input)],B=[...norm(cor)];
  if(!A.length||A.length!==B.length)return false; // 音節数が違えば音は合っていない
  let diff=0;
  for(let i=0;i<A.length;i++){
    if(A[i]===B[i])continue;
    const a=_decompSyl(A[i]),b=_decompSyl(B[i]);
    if(!a||!b)return false;
    const dc=a.cho!==b.cho,dv=a.jung!==b.jung,dj=a.jong!==b.jong;
    const forgivable=(dj&&!dc&&!dv)||(dv&&!dc&&!dj)||(dc&&!dv&&!dj&&_sameTense(a.cho,b.cho)); // 終声のみ/母音のみ/濃音激音の初声のみ
    if(!forgivable)return false;
    if(++diff>2)return false;
  }
  return diff>=1;
}
function classifyWritingError(input,w){
  const norm=s=>String(s||"").replace(/[\s~〜・･]/g,"");
  const inp=norm(input),cor=norm(w.ko);
  if(!inp)return{type:"unclassified",detail:null,wrongWordId:null};
  const other=KO_INDEX[inp];
  if(other&&other.id!==w.id){ // 優先1: 意味置換（登録済み単語＋カテゴリ/意味/関連語）
    const rel=(other.cat&&w.cat&&other.cat===w.cat)||sharedKanji(other.ja,w.ja)||cor.includes(inp)||inp.includes(cor)||jaHead(other)===jaHead(w);
    if(rel)return{type:"semantic_substitution",detail:null,wrongWordId:other.id};
  }
  const dist=_lev([...inp],[...cor]); // 優先2: 音写（編集距離2以内 または 類似率65%以上）
  const sim=1-dist/Math.max([...inp].length,[...cor].length);
  if(dist<=2||sim>=0.65)return{type:"phonetic_spelling",detail:phoneticDetail(inp,cor),wrongWordId:null};
  if(other&&other.id!==w.id)return{type:"semantic_substitution",detail:null,wrongWordId:other.id};
  return{type:"unclassified",detail:null,wrongWordId:null}; // 優先3: 未分類
}

/* --- 判定対象履歴: 直近90日かつ直近300回答。recency重み exp(-days/45) --- */
function diagWindow(){
  const now=Date.now();
  return loadHistory()
    .filter(r=>(now-new Date(r.answeredAt).getTime())/86400000<=90)
    .slice(-300)
    .map(r=>({r,w:Math.exp(-((now-new Date(r.answeredAt).getTime())/86400000)/45)}));
}
function computeDiagnosis(){
  const win=diagWindow();
  const CTX=["same_scene","context_related","category_neighbor","broader_narrower","cultural_confusion","role_confusion"];
  // 軸1: 誤答固定率（同一単語2回以上誤答の加重平均、3語未満は分析中）
  const wrongs=win.filter(x=>x.r.answerType==="choice"&&x.r.answerStatus==="incorrect"&&x.r.userAnswer);
  const byWord={};wrongs.forEach(x=>{(byWord[x.r.wordId]=byWord[x.r.wordId]||[]).push(x);});
  let n1=0,num=0,den=0;
  Object.values(byWord).forEach(arr=>{
    if(arr.length<2)return;n1++;
    const cnt={};let ws=0;arr.forEach(x=>{cnt[x.r.userAnswer]=(cnt[x.r.userAnswer]||0)+1;ws+=x.w;});
    num+=(Math.max(...Object.values(cnt))/arr.length)*ws;den+=ws;
  });
  const s1=den?num/den*100:null;
  const hasData=win.length>0; // 履歴が1件でもあれば未確定軸は右側(U/C/S/D)を既定として必ず4文字を確定
  const axis1={no:1,score:s1,code:s1!=null?(s1>=60?"F":"U"):(hasData?"U":null),n:n1,need:Math.max(0,3-n1),provisional:n1<3};
  // 軸2: 意味類似誤答率（10件未満は仮判定）
  let sem=0,ctx=0,n2=0;
  wrongs.forEach(x=>{const t=x.r.distractorType;if(!t)return;
    if(t==="semantic_close"){sem+=x.w;n2++;}else if(CTX.includes(t)){ctx+=x.w;n2++;}});
  const s2=(sem+ctx)>0?sem/(sem+ctx)*100:null;
  const axis2={no:2,score:s2,code:s2!=null?(s2>=55?"M":"C"):(hasData?"C":null),n:n2,need:Math.max(0,10-n2),provisional:n2<10};
  // 軸3: 音写率（分類可能誤答5件未満は分析中）
  let ph=0,ss=0,n3=0;
  win.forEach(x=>{const t=x.r.writingErrorType;
    if(t==="phonetic_spelling"){ph+=x.w;n3++;}else if(t==="semantic_substitution"){ss+=x.w;n3++;}});
  const s3=(ph+ss)>0?ph/(ph+ss)*100:null;
  const axis3={no:3,score:s3,code:s3!=null?(s3>=55?"P":"S"):(hasData?"S":null),n:n3,need:Math.max(0,5-n3),provisional:n3<5};
  // 軸4: 瞬発誤答 vs 熟考正答（四択のみ、わからない/時間切れ除外、20件未満は仮判定）
  const elig=win.filter(x=>x.r.answerType==="choice"&&(x.r.answerStatus==="correct"||x.r.answerStatus==="incorrect"));
  let qw=0,dc=0,tw=0;
  elig.forEach(x=>{tw+=x.w;
    if(!x.r.isCorrect&&x.r.responseTimeMs<3000)qw+=x.w;
    else if(x.r.isCorrect&&x.r.responseTimeMs>=3000)dc+=x.w;});
  const s4=(qw+dc)>0?qw/(qw+dc)*100:null;
  const axis4={no:4,score:s4,code:elig.length?((tw?qw/tw:0)>(tw?dc/tw:0)?"Q":"D"):(hasData?"D":null),n:elig.length,need:Math.max(0,20-elig.length),provisional:elig.length<20};
  const n=win.length;
  const confidence=n<30?"analyzing":n<100?"provisional":n<300?"current":"detailed";
  const axes=[axis1,axis2,axis3,axis4];
  return{axes,n,confidence,code:axes.map(a=>a.code||"?").join(""),complete:axes.every(a=>a.code)};
}

/* --- 外枠カラー（スコアで左右色を滑らかに補間。未確定軸は中間色） --- */
function lerpHex(h1,h2,t){
  const a=parseInt(h1.slice(1),16),b=parseInt(h2.slice(1),16);
  const f=(sa,sb)=>Math.round(sa+(sb-sa)*t);
  return"#"+((1<<24)|(f(a>>16,b>>16)<<16)|(f((a>>8)&255,(b>>8)&255)<<8)|f(a&255,b&255)).toString(16).slice(1);
}
function axisColor(ax,axis){return lerpHex(AXIS_COLORS[ax.R],AXIS_COLORS[ax.L],(axis.score==null?50:axis.score)/100);}
function frameColors(d){const o={};AXES.forEach((ax,i)=>o[ax.side]=axisColor(ax,d.axes[i]));return o;}
function applyFrameColors(d){
  const fc=frameColors(d),el=document.getElementById("tframe");
  if(!el)return;
  el.style.borderTopColor=fc.top;el.style.borderRightColor=fc.right;
  el.style.borderBottomColor=fc.bottom;el.style.borderLeftColor=fc.left;
}

/* --- 診断結果の保存（上書きせず履歴として追記） --- */
const LS_DIAG="kwt_diag_v1";
function loadDiag(){try{return JSON.parse(localStorage.getItem(LS_DIAG)||"[]");}catch(e){return[];}}
function charPathFor(d){return d.complete?`characters/${d.code.toLowerCase()}.svg`:"characters/analyzing.svg";}
function updateDiagnosis(){
  const d=computeDiagnosis();
  const hist=loadDiag(),last=hist[hist.length-1]||null;
  const changed=!last||last.diagnosisCode!==d.code||last.confidenceLevel!==d.confidence;
  if(changed){
    const fc=frameColors(d),rd=v=>v==null?null:Math.round(v);
    hist.push({userId:getUserId(),diagnosisCode:d.code,
      axis1Code:d.axes[0].code,axis1Score:rd(d.axes[0].score),
      axis2Code:d.axes[1].code,axis2Score:rd(d.axes[1].score),
      axis3Code:d.axes[2].code,axis3Score:rd(d.axes[2].score),
      axis4Code:d.axes[3].code,axis4Score:rd(d.axes[3].score),
      confidenceLevel:d.confidence,frameColors:fc,characterImagePath:charPathFor(d),
      calculatedAt:new Date().toISOString()});
    if(hist.length>200)hist.splice(0,hist.length-200);
    localStorage.setItem(LS_DIAG,JSON.stringify(hist));
  }
  applyFrameColors(d);refreshHomeType(d);
  return{diag:d,changed,prevCode:last?last.diagnosisCode:null};
}

function nextHint(d){
  if(d.n<30)return`あと${30-d.n}問で、仮タイプが表示されます`;
  const miss=d.axes.filter(a=>!a.code);
  if(miss.length){
    const m=miss[0];
    if(m.no===1)return"同じ単語での誤答が増えると、軸1が判定されます";
    if(m.no===3)return`書き取りの誤答があと${m.need}件で、軸3が判定されます`;
    return"履歴が増えると、残りの軸が判定されます";
  }
  if(d.n<100)return`あと${100-d.n}問で「現在のタイプ」になります`;
  if(d.n<300)return`あと${300-d.n}問で「詳細タイプ」になります`;
  return"";
}

function colorAxisParen(desc){
  return esc(desc).replace(/（([FUMCPSQD])：([^）]*)）/g,(m,l,b)=>`<span style="color:${AXIS_COLORS[l]||'inherit'};font-weight:800">（${l}：${b}）</span>`);
}
function renderTypeDetail(){
  const d=computeDiagnosis();
  const any=d.axes.some(a=>a.code);
  const fullCode=d.complete?d.code:AXES.map((ax,i)=>d.axes[i].code||ax.R).join("");
  if(!_typePeek)_typePeek=fullCode; // 標準では自分のタイプの説明を表示
  const ticks=[0,25,50,75,100].map(x=>`<span class="ax2tick${x===0||x===100?" end":""}" style="left:${x}%"></span>`).join("");
  const bars=AXES.map((ax,i)=>{
    const a=d.axes[i],t=Math.round(a.score==null?50:a.score); // t=左寄り度(0-100)
    const domLeft=t>=50,col=AXIS_COLORS[domLeft?ax.L:ax.R];
    const pos=100-t; // 左寄りほど点が左へ（ステータス画面と同じUI）
    return `<div class="ax2row">
      <span class="ax2dot" style="background:${AXIS_COLORS[ax.L]}"></span>
      <span class="ax2l">${ax.L}</span>
      <div class="ax2bar"><div class="ax2line"></div>${ticks}<div class="ax2knob" style="left:${pos}%;background:${col}"></div></div>
      <span class="ax2l">${ax.R}</span>
      <span class="ax2dot" style="background:${AXIS_COLORS[ax.R]}"></span>
    </div>
    <div class="st-axdesc"><span class="ad-l">${esc(ax.ln)}</span><span class="ad-r">${esc(ax.rn)}</span></div>
    <div class="ax2desc">${colorAxisParen(ax.desc)}</div>`;
  }).join(""); // ステータス画面と同じ設計：ラベルは白、説明文の括弧書きは軸カラー
  // タイプ説明（選択中＝既定は自分）
  const pk=_typePeek;
  const peek=`<div class="tpeek" id="tpeek-main"><img src="characters/${pk.toLowerCase()}.svg" alt="">
    <div><b>${pk} ${esc((TYPE_INFO[pk]||[""])[0])}</b><br>${esc(TYPE_LONG[pk]||"")}</div></div>`;
  const list=Object.entries(TYPE_INFO).map(([code,[name]])=>{
    const cur=code===fullCode,sel=_typePeek===code;
    return `<div class="trow${cur?" cur":""}${sel?" sel":""}" onclick="togglePeek('${code}')"><span class="tcode">${code}</span><span>${esc(name)}</span></div>`;
  }).join("");
  document.getElementById("s-type").innerHTML=`
   <div class="page">
    <div class="page-head"><button class="back" onclick="backToStatus()">‹</button><h2>タイプ詳細</h2></div>
    <div class="page-body">
      <div class="typebox tb-row" style="cursor:default">
        <img class="t-char" src="${charPathFor(d)}" alt="">
        <div class="tb-info"><div class="t-code">${any?d.code:"分析中"}</div><div class="t-job">${any?esc((TYPE_INFO[fullCode]||[""])[0]):""}</div></div>
      </div>
      <div class="tdetail-sec" style="margin-top:24px"><div class="ax2panel">${bars}</div></div>
      <div class="tdetail-sec">${peek}<div class="tlist">${list}</div></div>
    </div>
   </div>`;
  show("s-type");
  // 白パネルの高さを最長の説明文に合わせて固定（タイプ切替で高さが変わらないように。表示後に計測）
  const real=document.getElementById("tpeek-main");
  if(real){
    const longest=Object.entries(TYPE_LONG).sort((a,b)=>b[1].length-a[1].length)[0];
    const probe=document.createElement("div");probe.className="tpeek";probe.style.visibility="hidden";
    probe.innerHTML=`<img src="characters/${longest[0].toLowerCase()}.svg" alt=""><div><b>${longest[0]} ${esc((TYPE_INFO[longest[0]]||[""])[0])}</b><br>${esc(longest[1])}</div>`;
    real.parentNode.insertBefore(probe,real.nextSibling);
    real.style.minHeight=probe.offsetHeight+"px";
    probe.remove();
  }
}

/* ============================================================ ハングルIME（2ボル式 文字合成） ============================================================ */
const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const CHO_I={},JUNG_I={},JONG_I={};
CHO.forEach((c,i)=>CHO_I[c]=i);JUNG.forEach((c,i)=>JUNG_I[c]=i);JONG.forEach((c,i)=>{if(c)JONG_I[c]=i});
const COMB_JUNG={"ㅗㅏ":"ㅘ","ㅗㅐ":"ㅙ","ㅗㅣ":"ㅚ","ㅜㅓ":"ㅝ","ㅜㅔ":"ㅞ","ㅜㅣ":"ㅟ","ㅡㅣ":"ㅢ"};
const DEC_JUNG={"ㅘ":["ㅗ","ㅏ"],"ㅙ":["ㅗ","ㅐ"],"ㅚ":["ㅗ","ㅣ"],"ㅝ":["ㅜ","ㅓ"],"ㅞ":["ㅜ","ㅔ"],"ㅟ":["ㅜ","ㅣ"],"ㅢ":["ㅡ","ㅣ"]};
const COMB_JONG={"ㄱㅅ":"ㄳ","ㄴㅈ":"ㄵ","ㄴㅎ":"ㄶ","ㄹㄱ":"ㄺ","ㄹㅁ":"ㄻ","ㄹㅂ":"ㄼ","ㄹㅅ":"ㄽ","ㄹㅌ":"ㄾ","ㄹㅍ":"ㄿ","ㄹㅎ":"ㅀ","ㅂㅅ":"ㅄ"};
const DEC_JONG={"ㄳ":["ㄱ","ㅅ"],"ㄵ":["ㄴ","ㅈ"],"ㄶ":["ㄴ","ㅎ"],"ㄺ":["ㄹ","ㄱ"],"ㄻ":["ㄹ","ㅁ"],"ㄼ":["ㄹ","ㅂ"],"ㄽ":["ㄹ","ㅅ"],"ㄾ":["ㄹ","ㅌ"],"ㄿ":["ㄹ","ㅍ"],"ㅀ":["ㄹ","ㅎ"],"ㅄ":["ㅂ","ㅅ"]};
const isVowel=j=>JUNG_I[j]!==undefined;
const isValidJong=j=>JONG_I[j]!==undefined;

const IME={
  cho:null,jung:null,jong:null,committed:"",
  reset(){this.cho=this.jung=this.jong=null;this.committed="";},
  _renderBlock(cho,jung,jong){
    if(cho===null&&jung===null)return"";
    if(cho!==null&&jung===null)return cho;
    if(cho===null&&jung!==null)return jung;
    const ti=jong?JONG_I[jong]:0;
    return String.fromCharCode(0xAC00+(CHO_I[cho]*21+JUNG_I[jung])*28+ti);
  },
  _render(){return this._renderBlock(this.cho,this.jung,this.jong);},
  text(){return this.committed+this._render();},
  commit(){this.committed+=this._render();this.cho=this.jung=this.jong=null;},
  input(j){ isVowel(j)?this._vowel(j):this._cons(j); },
  _cons(j){
    if(this.cho===null&&this.jung===null&&this.jong===null){this.cho=j;return;}
    if(this.cho!==null&&this.jung===null){this.commit();this.cho=j;return;}
    if(this.cho===null&&this.jung!==null){this.commit();this.cho=j;return;}
    if(this.jong===null){
      if(isValidJong(j))this.jong=j; else{this.commit();this.cho=j;}
      return;
    }
    const c=COMB_JONG[this.jong+j];
    if(c)this.jong=c; else{this.commit();this.cho=j;}
  },
  _vowel(j){
    if(this.cho===null&&this.jung===null){this.jung=j;return;}
    if(this.cho!==null&&this.jung===null){this.jung=j;return;}
    if(this.jong===null){
      const c=COMB_JUNG[this.jung+j];
      if(c)this.jung=c; else{this.commit();this.jung=j;}
      return;
    }
    // 終声あり → 終声の最後の子音を次の音節の初声へ移動
    const d=DEC_JONG[this.jong];
    let baseJong,movedCho;
    if(d){baseJong=d[0];movedCho=d[1];} else {baseJong=null;movedCho=this.jong;}
    this.committed+=this._renderBlock(this.cho,this.jung,baseJong);
    this.cho=movedCho;this.jung=j;this.jong=null;
  },
  space(){this.commit();this.committed+=" ";},
  backspace(){
    if(this.jong!==null){const d=DEC_JONG[this.jong];this.jong=d?d[0]:null;return;}
    if(this.jung!==null){const d=DEC_JUNG[this.jung];this.jung=d?d[0]:null;return;}
    if(this.cho!==null){this.cho=null;return;}
    if(this.committed.length>0){
      const last=this.committed[this.committed.length-1];
      this.committed=this.committed.slice(0,-1);
      const code=last.charCodeAt(0);
      if(code>=0xAC00&&code<=0xD7A3){
        const s=code-0xAC00;
        this.cho=CHO[Math.floor(s/(21*28))];
        this.jung=JUNG[Math.floor((s%(21*28))/28)];
        const ti=s%28;this.jong=ti?JONG[ti]:null;
        this.backspace();
      }
    }
  }
};

function getUserId(){let u=localStorage.getItem(LS_USER);if(!u){u="u-"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);localStorage.setItem(LS_USER,u);}return u;}

/* 保存の安全弁: 容量オーバー時は再生成可能な診断履歴を捨て→古い回答明細を強めに間引いて再試行し、学習の核(stats/cards)が静かに失われるのを防ぐ */
function _lsSet(key,value){
  try{localStorage.setItem(key,value);return true;}
  catch(e){
    try{localStorage.removeItem(LS_DIAG);}catch(_){} // 診断履歴は再生成可能
    try{
      const h=JSON.parse(localStorage.getItem(LS_HIST)||"[]");
      if(h.length>500){
        const meta=JSON.parse(localStorage.getItem("kwt_histmeta_v1")||"{}");
        const keep=h.slice(-500);
        meta.prunedTests=(meta.prunedTests||0)+new Set(h.slice(0,h.length-500).map(r=>r.testId)).size;
        localStorage.setItem("kwt_histmeta_v1",JSON.stringify(meta));
        localStorage.setItem(LS_HIST,JSON.stringify(keep));_histIdxCache=null;
      }
    }catch(_){}
    try{localStorage.setItem(key,value);return true;}catch(e2){return false;}
  }
}
function saveAnswer(rec){const h=loadHistory();h.push(rec);if(h.length>5000)h.splice(0,h.length-5000);_lsSet(LS_HIST,JSON.stringify(h));_histIdxCache=null;} // 回答明細も上限を設けて無制限成長を防ぐ
function getPerfectCount(){return parseInt(localStorage.getItem(LS_PERFECT)||"0",10);}
function incPerfectCount(){const n=getPerfectCount()+1;localStorage.setItem(LS_PERFECT,String(n));return n;}

/* --- 単語別の記憶状態（忘却/形成モデル）。係数はconfigで外出し（後から調整可能） --- */
const MEMORY_CONFIG={
  initialMemoryScore:0, initialFormingScore:0,
  initialStabilityHours:12, initialFormingStabilityHours:12,
  minStabilityHours:6, maxStabilityHours:720, reviewThreshold:70,
  defaultWordDifficulty:1.0, minWordDifficulty:0.7, maxWordDifficulty:1.5,
  historyDecayLambda:0.08, accuracyBonusWeight:0.5,
  dailyGainMax:0.25, dailyGainK:0.8,
  predictionLearningRateGamma:0.25,
  correctActualMin:60, correctActualMax:95, responseSpeedAlpha:0.10,
  formingIncorrectGain:5, formingUnknownGain:3, formingTimeoutGain:2, firstCorrectMemoryScore:45,
  choiceFastCorrectDelta:12, choiceNormalCorrectDelta:8,
  writingFastCorrectDelta:18, writingNormalCorrectDelta:14,
  choiceIncorrectDelta:-15, writingIncorrectDelta:-18, unknownDelta:-18, timeoutDelta:-18,
  hintMultiplier:0.5,
  actualIncorrect:25, actualUnknown:10, actualTimeout:15,
  fastChoiceSec:5, fastWritingSec:10
};
const DEFAULT_SCORE=0; // 互換: 未学習語の初期記憶スコア
function clampN(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function loadStats(){try{return JSON.parse(localStorage.getItem(LS_STATS)||"{}");}catch(e){return{};}}
function saveStats(s){_lsSet(LS_STATS,JSON.stringify(s));}
function defaultStat(){const C=MEMORY_CONFIG;return{
  hasSeen:false,hasEverCorrect:false,
  memoryScore:C.initialMemoryScore,formingScore:C.initialFormingScore,
  stabilityHours:C.initialStabilityHours,wordDifficulty:C.defaultWordDifficulty,
  lastReviewedAt:null,firstCorrectAt:null,lastReviewDay:null,nextReviewAt:null,
  reviewCount:0,correctCount:0,incorrectCount:0,sameDayCorrectCount:0,
  consecutiveCorrectCount:0,averageResponseTimeMs:0,
  lastAnswerStatus:null,lastAnswerType:null,lastResponseTimeSec:null,isHintProvided:false};}
function getStat(id,store){
  const raw=(store||loadStats())[id];
  const st=raw?Object.assign(defaultStat(),raw):defaultStat();
  st.wordId=id;
  // --- 旧データ移行: 新フィールドが無い既存statを補完 ---
  if(raw){
    if(raw.hasSeen===undefined)st.hasSeen=raw.lastReviewedAt!=null;
    if(raw.hasEverCorrect===undefined)st.hasEverCorrect=(raw.correctCount||0)>0;
    if(raw.stabilityHours===undefined)st.stabilityHours=clampN(12*(1+(raw.consecutiveCorrectCount||0))+6*(raw.correctCount||0),MEMORY_CONFIG.minStabilityHours,MEMORY_CONFIG.maxStabilityHours);
    if(raw.wordDifficulty===undefined)st.wordDifficulty=MEMORY_CONFIG.defaultWordDifficulty;
  }
  return st;
}
/* 履歴を単語ごとに索引（重い再計算を避けるためキャッシュ。saveAnswerで無効化） */
let _histIdxCache=null;
function histByWord(){
  if(_histIdxCache)return _histIdxCache;
  const m={};loadHistory().forEach(r=>{(m[r.wordId]=m[r.wordId]||[]).push(r);});
  for(const k in m)m[k].sort((a,b)=>String(a.answeredAt).localeCompare(String(b.answeredAt)));
  _histIdxCache=m;return m;
}
function dayKey(ms){const d=new Date(ms);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
/* Ba: 時間減衰付き正答率補正（最近の回答ほど重い） */
function accuracyBonus(wordId,nowMs){
  const C=MEMORY_CONFIG,recs=histByWord()[wordId]||[];
  if(!recs.length)return 1;
  let num=0,den=0;
  recs.forEach(r=>{const dt=Math.max(0,(nowMs-new Date(r.answeredAt).getTime())/86400000);const w=Math.exp(-C.historyDecayLambda*dt);den+=w;num+=w*(r.isCorrect?1:0);});
  return 1+C.accuracyBonusWeight*(den>0?num/den:0);
}
/* Cd: 同日定着上限補正（その日の同一単語の正解回数で頭打ち） */
function dailyConsolidationBonus(st,nowMs){
  const C=MEMORY_CONFIG;
  const n=(st.lastReviewDay===dayKey(nowMs))?(st.sameDayCorrectCount||0):0;
  return 1+C.dailyGainMax*(1-Math.exp(-C.dailyGainK*n));
}
/* 実効安定度 = Su * Ba * Cd / Dw */
function effectiveStability(st,nowMs){
  const C=MEMORY_CONFIG;
  const Su=clampN(st.stabilityHours||C.initialStabilityHours,C.minStabilityHours,C.maxStabilityHours);
  const Dw=clampN(st.wordDifficulty||C.defaultWordDifficulty,C.minWordDifficulty,C.maxWordDifficulty);
  return Math.max(1,Su*accuracyBonus(st.wordId,nowMs)*dailyConsolidationBonus(st,nowMs)/Dw);
}
/* 現在の推定記憶率（初正解前は形成スコアの減衰、初正解後は忘却曲線） */
function displayMemoryScore(st,nowMs){
  const C=MEMORY_CONFIG;
  if(!st||st.lastReviewedAt==null)return 0; // 未接触=0
  const t=(nowMs-new Date(st.lastReviewedAt).getTime())/3600000;
  if(!st.hasEverCorrect){
    const Dw=clampN(st.wordDifficulty||C.defaultWordDifficulty,C.minWordDifficulty,C.maxWordDifficulty);
    return (st.formingScore||0)*Math.exp(-(t*Dw)/C.initialFormingStabilityHours);
  }
  return (st.memoryScore||0)*Math.exp(-t/effectiveStability(st,nowMs));
}
function displayScore(st,nowMs){return displayMemoryScore(st,nowMs);} // 互換エイリアス
function stabilityHours(st){return effectiveStability(st,Date.now());} // 互換（hoursTo70等）
/* 単語状態の分類（new/forming/urgent/review/stabilizing/stable） */
function wordState(st,nowMs){
  if(!st||!st.hasSeen&&st.lastReviewedAt==null)return"new";
  if(!st.hasEverCorrect)return"forming";
  const M=displayMemoryScore(st,nowMs);
  if(M<40)return"urgent";
  if(M<70)return"review";
  if(M<85)return"stabilizing";
  return"stable";
}
function overallCondition(nowMs){const s=loadStats();let t=0;WORDS.forEach(w=>t+=displayScore(getStat(w.id,s),nowMs));return t/WORDS.length;}
function reviewNeedCount(nowMs){const s=loadStats();return WORDS.filter(w=>displayScore(getStat(w.id,s),nowMs)<MEMORY_CONFIG.reviewThreshold).length;}

/* ============================================================ 韓国語音声（正解時のみ） ============================================================ */
/* 既存の音声ファイルが word.audio に登録されていればそれを優先。無ければSpeechSynthesisで ko-KR 読み上げ。 */
/* 効果音（WebAudio合成）。スタート時とプレゼント受け取り時 */
let _sfxCtx=null;
function _sfx(){try{_sfxCtx=_sfxCtx||new (window.AudioContext||window.webkitAudioContext)();if(_sfxCtx.state==="suspended")_sfxCtx.resume();return _sfxCtx;}catch(e){return null;}}
/* 起動直後は自動再生ポリシーでAudioContextがsuspendedのまま→最初の効果音が鳴らない。最初のユーザー操作で一度だけ解錠する */
(function(){
  const unlock=()=>{try{const c=_sfx();if(c&&c.state!=="suspended"){const g=c.createGain();g.gain.value=0;g.connect(c.destination);const o=c.createOscillator();o.connect(g);o.start();o.stop(c.currentTime+0.01);}}catch(e){}
    ["pointerdown","touchstart","keydown"].forEach(ev=>document.removeEventListener(ev,unlock,true));};
  ["pointerdown","touchstart","keydown"].forEach(ev=>document.addEventListener(ev,unlock,true));
})();
function _tone(ctx,freq,t0,dur,vol,type){const o=ctx.createOscillator(),g=ctx.createGain();o.type=type||"sine";o.frequency.value=freq;
  g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(ctx.destination);o.start(t0);o.stop(t0+dur+0.05);}
function sfxStart(){if(loadSettings().sound===false)return;const c=_sfx();if(!c)return;const t=c.currentTime; _tone(c,880,t,0.08,0.18,"square");_tone(c,880,t+0.12,0.14,0.2,"square");} // 「ピ・ピー」の開始音
function sfxCorrect(){if(loadSettings().sound===false)return;const c=_sfx();if(!c)return;const t=c.currentTime; _tone(c,784,t,0.09,0.15,"triangle");_tone(c,1175,t+0.08,0.18,0.15,"triangle");} // 正解: 明るい2音上昇（読み上げより小さめ）
function sfxIncorrect(){if(loadSettings().sound===false)return;const c=_sfx();if(!c)return;const t=c.currentTime; _tone(c,320,t,0.14,0.14,"sawtooth");_tone(c,220,t+0.1,0.2,0.14,"sawtooth");} // 不正解: 低い2音下降
function sfxNeutral(){if(loadSettings().sound===false)return;const c=_sfx();if(!c)return;const t=c.currentTime; _tone(c,520,t,0.14,0.12,"sine");} // わからない: やわらかい単音（失敗音にしない）
function sfxClaim(){if(loadSettings().sound===false)return;const c=_sfx();if(!c)return;const t=c.currentTime;[523,659,784,1047].forEach((f,i)=>_tone(c,f,t+i*0.07,0.3,0.2,"triangle"));_tone(c,1568,t+0.3,0.45,0.1,"sine");}
let _koVoice=null,_curAudio=null;
function _pickKoVoice(){
  if(!('speechSynthesis' in window))return;
  const vs=window.speechSynthesis.getVoices()||[];
  _koVoice=vs.find(v=>v.lang==="ko-KR")||vs.find(v=>v.lang&&v.lang.toLowerCase().replace("_","-").indexOf("ko")===0)||null;
}
if('speechSynthesis' in window){_pickKoVoice();window.speechSynthesis.onvoiceschanged=_pickKoVoice;}
function stopSpeak(){
  try{ if('speechSynthesis' in window)window.speechSynthesis.cancel(); }catch(e){}
  try{ if(_curAudio){_curAudio.pause();_curAudio.currentTime=0;_curAudio=null;} }catch(e){}
}
function speakKorean(word){

function _speakTTS(text,rate){
