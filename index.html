/* ============================================================ 出題ロジック ============================================================ */
const PLAN=[...Array(5).fill("jk"),...Array(5).fill("kj"),...Array(2).fill("w")];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(a,n){return shuffle(a).slice(0,n);}
/* ---- 紛らわしい選択肢の生成（品詞一致＋類似度スコア） ---- */
/* 品詞判定: 〜다=用言（訳が い/だ 終わり=形容詞、他=動詞）、訳が に/く/と 終わり=副詞、他=名詞 */
function posOf(w){
  if(w._pos)return w._pos;
  const j=(w.ja||"").split(/[、,（(]/)[0].trim();
  let p;
  if(/다$/.test(w.ko.replace(/\s/g,"")))p=/(い|だ)$/.test(j)?"adj":"verb";
  else if(j.length>=2&&/[にくと]$/.test(j))p="adv";
  else p="noun";
  return w._pos=p;
}
/* 韓国語の見た目の紛らわしさ：頭音節・末尾一致、共有音節、長さ近似 */
function simKo(a,b){
  const A=[...a.ko.replace(/[^가-힣]/g,"")],B=[...b.ko.replace(/[^가-힣]/g,"")];
  let s=0;
  if(A[0]===B[0])s+=3;
  if(A[A.length-1]===B[B.length-1])s+=2;
  s+=Math.max(0,2-Math.abs(A.length-B.length));
  const setB=new Set(B);new Set(A).forEach(ch=>{if(setB.has(ch))s+=1;});
  return s;
}
/* 日本語訳の紛らわしさ：共有漢字＋長さ近似 */
function simJa(a,b){
  const A=new Set([...a.ja].filter(c=>/[一-龯々]/.test(c)));
  let s=0;new Set([...b.ja]).forEach(c=>{if(A.has(c))s+=2;});
  s+=Math.max(0,2-Math.abs(a.ja.length-b.ja.length))*0.5;
  return s;
}
/* 第一義（最初の訳語）。同義語を誤答に混ぜない判定に使う */
function jaHead(w){return (w.ja||"").split(/[、,（(]/)[0].trim();}
function sharedKanji(a,b){const A=new Set([...String(a)].filter(c=>/[一-龯々]/.test(c)));return [...String(b)].some(c=>A.has(c));}
/* 誤答タグ：2語の実際の関係から決定（タイプ診断 軸2用） */
function relationTag(w,x,key){
  if(sharedKanji(w.ja,x.ja))return"semantic_close";          // 意味類似（訳の漢字共有）
  if(w.cat&&x.cat&&w.cat===x.cat){
    if(w.cat==="家族・人物")return"role_confusion";          // 人物・家族関係の混同
    if(w.cat==="韓国文化")return"cultural_confusion";        // 韓国文化上の混同
    return"same_scene";                                      // 同じ場面
  }
  if(key==="ko"&&simKo(w,x)>=4)return"form_similar";         // 音・表記類似
  return"context_related";                                   // 周辺概念
}
/* 品詞を合わせつつ「意味類似＋場面連想＋周辺/表記類似」の構成で3つ選ぶ */
function pickTaggedDistractors(w,pool,key){
  const pos=posOf(w);
  const base=pool.filter(x=>x.id!==w.id&&x[key]!==w[key]&&x.ko!==w.ko&&jaHead(x)!==jaHead(w));
  let cands=base.filter(x=>posOf(x)===pos);
  if(cands.length<6)cands=base.filter(x=>(pos==="adj"||pos==="verb")?(posOf(x)==="adj"||posOf(x)==="verb"):(posOf(x)==="noun"||posOf(x)==="adv"));
  if(cands.length<6)cands=base;
  const used=new Set([w[key]]),out=[];
  const take=arr=>{for(const x of arr){if(!used.has(x[key])){used.add(x[key]);out.push({text:x[key],type:relationTag(w,x,key),wordId:x.id});return;}}};
  const bySem=shuffle(cands).sort((a,b)=>simJa(w,b)-simJa(w,a));   // 意味類似（漢字共有）優先
  const byScene=shuffle(cands).sort((a,b)=>((b.cat&&b.cat===w.cat)?1:0)-((a.cat&&a.cat===w.cat)?1:0)||simJa(w,b)-simJa(w,a));
  const byForm=shuffle(cands).sort((a,b)=>simKo(w,b)-simKo(w,a));  // 表記類似（韓国語の見た目）
  take(bySem.slice(0,6));
  take(byScene);
  take(key==="ko"?byForm.slice(0,6):byScene);
  for(const x of bySem){if(out.length>=3)break;if(!used.has(x[key])){used.add(x[key]);out.push({text:x[key],type:relationTag(w,x,key),wordId:x.id});}}
  return out.slice(0,3);
}
/* 選択肢セット（タグ付きメタ込み）。Section01の手作り誤答(d)は漢字共有で意味類似/場面連想に自動タグ付け */
function buildChoiceSet(w,pool,key){
  const meta={};meta[w[key]]={distractorType:null,wordId:w.id};
  const ds=(key==="ja"&&w.d)
    ?w.d.slice(0,3).map(t=>({text:t,type:sharedKanji(w.ja,t)?"semantic_close":"same_scene",wordId:null}))
    :pickTaggedDistractors(w,pool,key);
  ds.forEach(d=>{meta[d.text]={distractorType:d.type,wordId:d.wordId};});
  return{choices:shuffle([w[key],...ds.map(d=>d.text)]),meta};
}

/* 誤答候補は同レベルの全語彙から（強雨量/降水量のような紛らわしいペアを拾えるように） */
function levelAllWords(){return curLevel==="beginner"?BEGINNER_WORDS:WORDS.concat(MIDDLE_WORDS);}

/* idリスト(+source)からPLANに沿って12問を生成。誤答はタグ付き（品詞一致＋意味類似/場面連想/周辺概念の構成） */
function makeQuestionsFromIds(list){
  const pool=levelAllWords();
  return list.slice(0,12).map((c,i)=>{
    const w=WORD_BY_ID[c.id],type=PLAN[i];
    let choices=null,correct,cmeta=null;
    if(type==="kj"){const cs=buildChoiceSet(w,pool,"ja");correct=w.ja;choices=cs.choices;cmeta=cs.meta;}
    else if(type==="jk"){const cs=buildChoiceSet(w,pool,"ko");correct=w.ko;choices=cs.choices;cmeta=cs.meta;}
    else{correct=w.ko;}
    return {word:w,type,choices,correct,source:c.source,cmeta};
  });
}

/* 復習枠の候補を優先順位順に並べて n 件返す（現在Sectionの単語のみ） */
function pickReview(n,excludeIds,prog,stats){
  if(n<=0)return[];
  const poolSet=new Set(sectionIds());
  const exclude=new Set(excludeIds);
  const last=prog.lastTestIds||[],prev=prog.prevTestIds||[];
  const blocked=new Set(last.filter(id=>prev.includes(id))); // 直近2回連続→3回目を避ける
  const cand=[];
  const push=arr=>arr.forEach(id=>{if(poolSet.has(id)&&!exclude.has(id)&&!blocked.has(id)&&!cand.includes(id))cand.push(id);});
  const slow=id=>{const s=stats[id];return s&&s.lastAnswerStatus==="correct"&&s.averageResponseTimeMs>(s.lastAnswerType==="writing"?10000:5000);};
  push(last.filter(id=>{const s=stats[id];return s&&["incorrect","timeout","unknown"].includes(s.lastAnswerStatus);})); // 1.直前で不正解等
  push(last.filter(slow));                                                                                              // 2.直前で正解だが遅い
  push([...last,...prev]);                                                                                              // 3.直近1〜3回
  push(Object.keys(stats).map(Number).sort((a,b)=>(stats[b].lastReviewedAt||"").localeCompare(stats[a].lastReviewedAt||""))); // 4.過去出題済み
  return cand.slice(0,n);
}

/* 通常テスト：新出枠9＋復習枠3。現在Sectionの単語群と進捗で管理 */
/* 各単語の優先度スコア（忘れそう/緊急/難/直近ミス/形成必要/重要度） */
function priorityScore(w,st,nowMs){
  const C=MEMORY_CONFIG;
  const disp=displayMemoryScore(st,nowMs);
  const forgettingRisk=100-disp;
  const urgency=(st.nextReviewAt&&new Date(st.nextReviewAt).getTime()<=nowMs)?100:(st.hasSeen?0:100);
  const difficulty=(clampN(st.wordDifficulty||C.defaultWordDifficulty,C.minWordDifficulty,C.maxWordDifficulty)-C.minWordDifficulty)/(C.maxWordDifficulty-C.minWordDifficulty)*100;
  const recentMistake=(st.hasSeen&&st.lastAnswerStatus!=="correct")?100:0;
  const formingNeed=!st.hasEverCorrect?100:0;
  const importance=(w.importanceScore!=null?w.importanceScore:50);
  let ps=forgettingRisk*0.30+urgency*0.20+difficulty*0.15+recentMistake*0.15+formingNeed*0.10+importance*0.10;
  const today=dayKey(nowMs);
  if(st.lastReviewDay===today&&(st.sameDayCorrectCount||0)>=2)ps*=0.4; // 同日2回以上正解は下げる
  return ps;
}
function buildQuestions(){
  const prog=loadProgress(),stats=loadStats(),nowMs=Date.now();
  const POOL_IDS=sectionIds();
  // 直近2回連続で出した単語は3回目を避ける
  const last=prog.lastTestIds||[],prev=prog.prevTestIds||[];
  const blocked=new Set(last.filter(id=>prev.includes(id)));
  // 状態分類と優先度
  // 先にシャッフル: 優先度が同点（例: 全部newの新規ROOM）のとき01から順に出ず、ランダムになる
  const info=shuffle(POOL_IDS).map(id=>{const w=WORD_BY_ID[id],st=getStat(id,stats);return{id,w,st,state:wordState(st,nowMs),ps:priorityScore(w,st,nowMs)};});
  const seen=info.filter(x=>x.st.hasSeen).length;
  const coverage=seen/Math.max(1,POOL_IDS.length);
  // カテゴリ枠（coverageが低いと探索を増やす）
  let quota=coverage<0.6?{nf:5,urgent:4,review:2,stabilizing:1,stable:0}:{nf:3,urgent:4,review:3,stabilizing:1,stable:1};
  const buckets={nf:[],urgent:[],review:[],stabilizing:[],stable:[]};
  info.forEach(x=>{
    if(blocked.has(x.id))return;
    if(x.state==="new"||x.state==="forming")buckets.nf.push(x);
    else if(x.state==="urgent")buckets.urgent.push(x);
    else if(x.state==="review")buckets.review.push(x);
    else if(x.state==="stabilizing")buckets.stabilizing.push(x);
    else buckets.stable.push(x);
  });
  for(const k in buckets)buckets[k].sort((a,b)=>b.ps-a.ps);
  // 枠ごとに抽出（偏り防止）→不足分は全体の優先度で補充
  const chosen=[],used=new Set();
  const take=(arr,n)=>{for(const x of arr){if(chosen.length>=12||n<=0)break;if(!used.has(x.id)){chosen.push(x);used.add(x.id);n--;}}};
  take(buckets.nf,quota.nf);take(buckets.urgent,quota.urgent);take(buckets.review,quota.review);take(buckets.stabilizing,quota.stabilizing);take(buckets.stable,quota.stable);
  if(chosen.length<12){
    const rest=info.filter(x=>!used.has(x.id)&&!blocked.has(x.id)).sort((a,b)=>b.ps-a.ps);
    take(rest,12-chosen.length);
  }
  if(chosen.length<12){ // それでも足りなければblocked解除して補充
    const rest=info.filter(x=>!used.has(x.id)).sort((a,b)=>b.ps-a.ps);
    take(rest,12-chosen.length);
  }
  // 形成/安定が書き取り枠(末尾2問)に来るよう並べ替え（出題形式を状態に寄せる）
  const writeRank=x=>(x.state==="stable"?3:x.state==="stabilizing"?2:0);
  chosen.sort((a,b)=>writeRank(a)-writeRank(b)); // 書き取り向きを後ろへ
  const list=chosen.slice(0,12).map(x=>({id:x.id,source:(x.state==="new"||x.state==="forming")?"new":"review"}));
  // 進捗保存（未接触の出題を記録）
  let served=new Set(prog.served||[]);
  list.forEach(c=>served.add(c.id));
  prog.served=Array.from(served);
  prog.prevTestIds=prog.lastTestIds||[];
  prog.lastTestIds=list.map(c=>c.id);
  saveProgress(prog);
  return makeQuestionsFromIds(list);
}

/* 復習テスト：指定idだけ（不足分は現在Sectionから補い12問に） */
function buildReviewQuestions(ids){
  let pool=ids.slice();
  const POOL_IDS=sectionIds();
  if(pool.length<12){ const used=new Set(pool); for(const id of shuffle(POOL_IDS.filter(id=>!used.has(id)))){ if(pool.length>=12)break; pool.push(id); } }
  const list=shuffle(pool.slice(0,12)).map(id=>({id,source:"review"}));
  const prog=loadProgress(); prog.prevTestIds=prog.lastTestIds||[]; prog.lastTestIds=list.map(c=>c.id); saveProgress(prog);
  return makeQuestionsFromIds(list);
}
const DIRECTION={jk:"jp_to_kr",kj:"kr_to_jp",w:"jp_to_kr"};
const ANS_TYPE={jk:"choice",kj:"choice",w:"writing"};

/* 採点 */
function scoreFor(type,isCorrect,t,isHint){
  if(!isCorrect)return 0;
  if(type==="w"){const base=t<10?10:9;return isHint?Math.ceil(base/2):base;} // 書き取り：ヒント付きは半分（小数は切り上げ）
  return t<5?8:7;                        // 四択：5秒未満=8, 5〜10=7
}
function rankFor(s){if(s===100)return"S";if(s<=50)return"D";if(s<=70)return"C";if(s<=80)return"B";return"A";}

let state=null,timer=null,qStart=0,answered=false,ovTimer=null,_roomCurveMode=false,_counting=false,_ovAdvance=null,_pqQuiz=false;
/* 通知確認・画面ロック・アプリ切替中はタイマーを完全停止し、裏で時間切れにしない（復帰時に離席ぶんを差し戻して再開） */
let _hiddenAt=0;
function _inActiveQuestion(){const q=document.getElementById("s-quiz");return !!(q&&q.classList.contains("on")&&!answered&&state&&!_counting);}
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    _hiddenAt=performance.now();
    if(_inActiveQuestion())clearInterval(timer); // 離席中はカウントを止める（throttleされたtickが裏で時間切れを撃つのを防ぐ）
    if(_ovAdvance)clearTimeout(ovTimer); // 自動送りも止める（裏で勝手に次へ進まない）
  }else if(_hiddenAt){
    const d=performance.now()-_hiddenAt;_hiddenAt=0;
    if(_inActiveQuestion()){qStart+=d;resumeTimer();} // 停止分を差し戻して計時再開
    if(_ovAdvance&&document.querySelector(".overlay"))ovTimer=setTimeout(_ovAdvance,700); // 復帰後に自動送りを短い間で再開
    else _ovAdvance=null;
  }
});

function confirmQuit(){
  if(_counting){quitTest();return;} // カウントダウン中はまだ問題が始まっていないので確認なしで即ホームへ
  if(_gearActive){gearConfirmQuit();return;} // 歯車モードは専用タイマーを止めて確認
  const t0=performance.now();
  clearInterval(timer); // ダイアログ表示中はタイマーを完全停止（裏で時間切れにならないように）
  const m=document.createElement("div");m.className="appconfirm";
  m.innerHTML=`<div class="ac-card"><div class="ac-t">テストを中断して<br>ホームに戻りますか？</div>
    <div class="ac-btns"><button class="btn ac-stop" id="ac-yes">はい</button><button class="btn ghost" id="ac-no">いいえ</button></div></div>`;
  document.body.appendChild(m);
  const resume=()=>{if(!answered){qStart+=performance.now()-t0;resumeTimer();}m.remove();}; // 停止していた分を差し戻して計時再開
  m.querySelector("#ac-no").onclick=resume;
  m.querySelector("#ac-yes").onclick=()=>{m.remove();quitTest();};
  m.onclick=e=>{if(e.target===m)resume();};
}
/* 出題中にホームへ戻る（タイマー・音声・○×表示を止めて中断） */

function startTest(reviewIds){

  state={questions:qs,idx:0,results:[],testId:"t-"+Date.now().toString(36),userId:getUserId(),
    cycleNumber:prog.cycleNumber||1,isReview:!!(reviewIds&&reviewIds.length),conditionBefore,reviewBefore,pwrBefore:pwrOverall(),roomPwrBefore:roomInfoFor(curSection).pwr,levelBefore:xpInfo().level,pq:_pqQuiz};
  _pqQuiz=false;
  sfxStart();
  if(typeof track==="function")track("quiz_start",{review:!!(reviewIds&&reviewIds.length)}); // ファネル起点（GA_ID設定時のみ）
  qrStopRain();qrClearLayer("q-rain");QR.active="q-rain"; // クイズ側の積もりをリセット（ホームの山は保持）
  updateAdvBtn();
  show("s-quiz");
  showCountdown(()=>renderQuestion());
}

/* スタート後の3・2・1カウントダウン。timer変数を共用するためquitTestで確実に止まる */
function showCountdown(cb){
  const stage=document.getElementById("qstage");
  document.getElementById("prog").textContent="";
  document.getElementById("time").textContent="";
  const qa=document.getElementById("qadv");if(qa)qa.style.visibility="hidden"; // スイッチは出題番号が出るまで隠す
  const fill=document.getElementById("tfill");if(fill){fill.className="tfill";fill.style.width="100%";}
  let n=3;_counting=true; // カウントダウン中フラグ（この間の戻るは確認なしで即ホームへ）
  const draw=()=>{stage.innerHTML=`<div class="cdown"><span class="cnum">${n}</span></div>`;};
  draw();
  clearInterval(timer);
  timer=setInterval(()=>{
    if(!document.getElementById("s-quiz").classList.contains("on")){clearInterval(timer);_counting=false;return;}
    n--;
    if(n<=0){clearInterval(timer);_counting=false;cb();return;}
    draw();
  },625); // 3・2・1は0.625秒間隔（従来500msの1.25倍ゆっくり）
}

/* ============================================================ 歯車モード（設定でONにするとスタートボタンが歯車出題に切替） ============================================================
 * 中央の4歯ダイヤルに韓国語、上下左右に日本語。タップで90°ずつ回して全対応を合わせ「回答」で判定。
 * 遊び方が全く別系統のため記憶エンジン（memoryScore等）は更新しない自己完結モード。 */
const GEAR_ROUNDS=6,GEAR_LIMIT=20;
let _gearActive=false,_gearTimer=null,_gearStart=0,_gearAnswered=false;
let _gear={rounds:[],idx:0,score:0,rot:0,shift:0,oks:[]};

function _gearBuildRounds(){
  // 現在ROOMの単語からラウンドごとに4語ずつ。プールが足りなければシャッフルして継ぎ足す
  let pool=shuffle(sectionPoolWords().filter(w=>w));
  while(pool.length<GEAR_ROUNDS*4)pool=pool.concat(shuffle(sectionPoolWords().filter(w=>w)));
  const rounds=[];
  for(let i=0;i<GEAR_ROUNDS;i++){
    const seg=pool.slice(i*4,i*4+4),seen=new Set(),words=[];
    seg.forEach(w=>{if(!seen.has(w.id)){seen.add(w.id);words.push(w);}});
    let j=0;while(words.length<4){const w=pool[(GEAR_ROUNDS*4+j++)%pool.length];if(w&&!seen.has(w.id)){seen.add(w.id);words.push(w);}}
    rounds.push(words);
  }
  return rounds;
}

function startGearQuiz(){
  _gear={rounds:_gearBuildRounds(),idx:0,score:0,rot:0,shift:0,oks:[]};
  _gearActive=true;_gearAnswered=false;
  if(state)state.pq=false; // 直前がプリQQでもピンクテーマを引き継がない
  sfxStart();
  if(typeof track==="function")track("quiz_start",{gear:true});
  qrStopRain();qrClearLayer("q-rain");QR.active="q-rain";
  show("s-quiz");
  const qa=document.getElementById("qadv");if(qa)qa.style.visibility="hidden"; // 進み方スイッチは歯車モードでは使わない
  showCountdown(()=>renderGearRound());
}

function renderGearRound(){
  if(!_gearActive)return;
  const words=_gear.rounds[_gear.idx];
  _gear.rot=0;_gear.shift=1+Math.floor(Math.random()*3); // 開始時点で必ずズレた状態から
  _gearAnswered=false;
  document.getElementById("prog").textContent=(_gear.idx+1)+" / "+GEAR_ROUNDS;
  const qa=document.getElementById("qadv");if(qa)qa.style.visibility="hidden";
  const POS=["jt","jr","jb","jl"],ANG=[0,90,180,270];
  // 歯tooth位置tには words[(t+shift)%4] の韓国語（回転rでshiftと一致したら全対応が揃う）
  document.getElementById("qstage").innerHTML=`
    <div class="gear-stage">
      <div class="gear-hint">⚙️ ダイヤルをタップして回し、意味を合わせよう</div>
      <div class="gear-board">
        ${words.map((w,i)=>`<div class="gear-ja ${POS[i]}" id="gja-${i}">${esc(w.ja)}</div>`).join("")}
        <div class="gear-dial" id="gear-dial" role="button" aria-label="ダイヤルを回す">
          <div class="gear-body" id="gear-body">
            <div class="gear-core"></div>
            ${ANG.map((a,t)=>`<div class="gear-tooth" style="transform:rotate(${a}deg) translateY(calc(var(--gs)*-.5))"></div>`).join("")}
          </div>
          ${ANG.map((a,t)=>`<div class="gear-ko" id="gko-${t}" style="transform:rotate(${a}deg) translateY(calc(var(--gs)*-.5)) rotate(${-a}deg)">${esc(words[(t+_gear.shift)%4].ko)}</div>`).join("")}
          <div class="gear-hub">⟳</div>
        </div>
      </div>
    </div>
    <div class="gear-bottom"><button class="gear-answer" id="gear-answer">回答</button></div>`;
  document.getElementById("gear-dial").addEventListener("click",()=>{
    if(_gearAnswered)return;
    _gear.rot++;sfxGearTick();_gearApplyRot();
  });
  document.getElementById("gear-answer").addEventListener("click",gearSubmit);
  _gearStartTimer();
}

/* 回転を描画：歯車本体は回し、韓国語ラベルは軌道上を回りつつ文字は常に正立 */
function _gearApplyRot(){
  const deg=_gear.rot*90;
  const body=document.getElementById("gear-body");if(body)body.style.transform=`rotate(${deg}deg)`;
  for(let t=0;t<4;t++){
    const el=document.getElementById("gko-"+t);if(!el)continue;
    const a=t*90+deg;
    el.style.transform=`rotate(${a}deg) translateY(calc(var(--gs)*-.5)) rotate(${-a}deg)`;
  }
}

function sfxGearTick(){if(loadSettings().sound===false)return;const c=_sfx();if(!c)return;const t=c.currentTime;_tone(c,620,t,0.04,0.09,"square");_tone(c,880,t+0.03,0.05,0.07,"square");} // カチッという回転音

function _gearStartTimer(resume){
  clearInterval(_gearTimer);
  const limit=Math.round(GEAR_LIMIT*(loadSettings().slowTimer?1.5:1));
  if(!resume)_gearStart=performance.now(); // 中断ダイアログ復帰時は計時を引き継ぐ
  const tick=()=>{
    const el=(performance.now()-_gearStart)/1000,remain=Math.max(0,limit-el);
    const fill=document.getElementById("tfill"),tt=document.getElementById("time");
    if(fill){fill.style.width=(remain/limit*100)+"%";fill.className="tfill"+(remain<=limit*0.3?" warn":"");}
    if(tt)tt.textContent=remain.toFixed(1);
    if(remain<=0){clearInterval(_gearTimer);if(!_gearAnswered)gearSubmit(true);}
  };
  tick();_gearTimer=setInterval(tick,100);
}

function gearSubmit(isTimeout){
  if(_gearAnswered||!_gearActive)return;_gearAnswered=true;clearInterval(_gearTimer);
  const ok=isTimeout!==true&&(((_gear.rot%4)+4)%4)===_gear.shift;
  _gear.oks.push(ok);if(ok)_gear.score++;
  const ans=document.getElementById("gear-answer");if(ans)ans.disabled=true;
  const flash=(cls,sym)=>{const ov=document.createElement("div");ov.className="overlay";ov.style.pointerEvents="none";ov.innerHTML=`<div class="ovsym ${cls}">${sym}</div>`;document.body.appendChild(ov);setTimeout(()=>ov.remove(),ok?1100:2100);};
  const markAll=()=>{for(let i=0;i<4;i++){const el=document.getElementById("gja-"+i);if(el)el.classList.add("hit");}};
  if(ok){
    sfxCorrect();flash("o","○");markAll();
    setTimeout(_gearNext,1300);
  }else{
    if(isTimeout===true)sfxNeutral();else sfxIncorrect();
    flash(isTimeout===true?"t":"x",isTimeout===true?"△":"×");
    // 正解位置まで自動で回して見せる（学習のため正しい対応を提示）
    setTimeout(()=>{_gear.rot+=(((_gear.shift-_gear.rot)%4)+4)%4;_gearApplyRot();setTimeout(markAll,550);},600);
    setTimeout(_gearNext,2600);
  }
}
function _gearNext(){
  if(!_gearActive)return;
  if(_gear.idx>=GEAR_ROUNDS-1){renderGearResult();return;}
  _gear.idx++;renderGearRound();
}

function renderGearResult(){
  clearInterval(_gearTimer);_gearActive=false; // モード終了（戻るキーで直接ホームへ抜けても残らない）
  const s=_gear.score;
  const cheer=s>=GEAR_ROUNDS?"全問クリア！かみ合いは完璧！":s>=GEAR_ROUNDS-1?"あと一歩で全問クリア！":s>=Math.ceil(GEAR_ROUNDS/2)?"いいかみ合わせ！この調子！":"回すほど強くなる。もう一周いこう！";
  document.getElementById("s-result").innerHTML=`
    <div class="gres">
      <div class="gres-ico">⚙️</div>
      <div class="gres-t">歯車モード</div>
      <div class="gres-score">${s}<small> / ${GEAR_ROUNDS}</small></div>
      <div class="gres-dots">${_gear.oks.map(o=>`<i class="${o?"ok":""}"></i>`).join("")}</div>
      <div class="gres-cheer">${cheer}</div>
      <div class="gres-btns">
        <button class="btn dark full" onclick="startGearQuiz()">もう一度まわす</button>
        <button class="btn wt full" onclick="show('s-home')">ホームへ</button>
      </div>
    </div>`;
  if(s>=GEAR_ROUNDS)sfxClaim();
  show("s-result");
}
function gearConfirmQuit(){
  const t0=performance.now();clearInterval(_gearTimer);
  const m=document.createElement("div");m.className="appconfirm";
  m.innerHTML=`<div class="ac-card"><div class="ac-t">歯車モードを中断して<br>ホームに戻りますか？</div>
    <div class="ac-btns"><button class="btn ac-stop" id="ac-yes">はい</button><button class="btn ghost" id="ac-no">いいえ</button></div></div>`;
  document.body.appendChild(m);

}
function updateStartBtnMode(){const b=document.querySelector(".start-button");if(b)b.classList.toggle("gearmode",!!loadSettings().gearMode);}

function curLimit(){const base=state.questions[state.idx].type==="w"?20:10;return Math.round(base*(loadSettings().slowTimer?1.5:1));} // じっくりモードは1.5倍

function _tick(){
  const limit=curLimit(),fill=document.getElementById("tfill"),tt=document.getElementById("time");
  const el=(performance.now()-qStart)/1000, remain=Math.max(0,limit-el);
  if(fill){fill.style.width=(remain/limit*100)+"%";fill.className="tfill"+(remain<=limit*0.3?" warn":"");}
  if(tt)tt.textContent=remain.toFixed(1);
  if(remain<=0){clearInterval(timer);if(!answered)submit("timeout","");}
}
function startTimer(){qStart=performance.now();answered=false;clearInterval(timer);_tick();timer=setInterval(_tick,100);}
function resumeTimer(){clearInterval(timer);_tick();timer=setInterval(_tick,100);} // qStart/answeredは保持したまま計時だけ再開（中断ダイアログからの復帰用）

function renderQuestion(){
  _counting=false; // 実際の問題に入ったのでカウントダウン中フラグを解除（以後の戻るは確認ダイアログ）
  if(typeof track==="function"){if(state.idx===0)track("q1_shown");else if(state.idx===5)track("q6_reached");} // 離脱ファネル計測（GA_ID設定時のみ有効）
  // 遷移時に音声を止めない（長い単語が途中で切れないよう最後まで再生させる）。
  // 重複防止は次の正解時に speakKorean() 側の stopSpeak() が担う。
  const q=state.questions[state.idx];
  document.getElementById("prog").textContent=(state.idx+1)+" / 12";
  const _qa=document.getElementById("qadv");if(_qa)_qa.style.visibility="visible"; // 出題番号と同時にスイッチ表示
  const stage=document.getElementById("qstage");
  if(q.type==="kj"||q.type==="jk"){
    const display=q.type==="kj"?q.word.ko:q.word.ja;
    stage.innerHTML=`
      <div class="qmain"><div class="qword${q.type==="jk"?" ja":""}">${esc(display)}</div></div>
      <div class="qbottom">
        <div class="choices">${q.choices.map(c=>`<button class="choice" data-v="${esc(c)}" onclick="if(!answered)pick(this.dataset.v)">${esc(c)}</button>`).join("")}</div>
        <button class="unknown" onclick="submit('unknown','')">わからない</button>
      </div>`;
    bindChoiceDrag(); // タップ即確定でなく、触れた選択肢が黄色く光り→スライドして離した位置で確定
  }else{
    IME.reset();
    // 成績連動：Q1〜Q10の正解数が7問以下ならヒント付き（先頭1音節を自動表示）、8問以上なら通常
    const choiceCorrect=state.results.slice(0,10).filter(r=>r.isCorrect).length;
    state.choiceCorrectCount=choiceCorrect;
    const hint=choiceCorrect<=7;
    q.isHintProvided=hint;
    q.hintText=hint?([...q.word.ko].find(ch=>/[가-힣]/.test(ch))||[...q.word.ko.trim()][0]):null;
    const hintHTML=hint?`<div class="whint">ヒント：<b>${esc(q.hintText)}</b></div>`:"";
    stage.innerHTML=`
      <div class="qmain" style="flex:0 0 auto;padding-top:5vh;min-height:24vh"><div class="qword ja">${esc(q.word.ja)}</div>${hintHTML}</div>
      <div class="winput" id="winput"></div>
      ${keyboardHTML()}`;
    refreshInput();
  }
  startTimer();
}

function pick(v){const q=state.questions[state.idx];submit(v===q.correct?"correct":"incorrect",v);}
/* ドラッグ選択: 触れた選択肢を黄色く光らせ（候補）、指を滑らせて離した位置の選択肢で確定。選択肢外で離すと取り消し */
function bindChoiceDrag(){
  const wrap=document.querySelector("#qstage .choices");if(!wrap)return;
  let active=false;
  const choices=[...wrap.querySelectorAll(".choice")];
  // 指の直下の選択肢。無ければ縦位置が最も近い選択肢（隙間12pxを押しても選べるように）
  const choiceAt=(x,y)=>{
    const hit=document.elementsFromPoint(x,y).find(el=>el.classList&&el.classList.contains("choice")&&wrap.contains(el));
    if(hit)return hit;
    let best=null,bd=1e9;choices.forEach(b=>{const r=b.getBoundingClientRect();const d=y<r.top?r.top-y:(y>r.bottom?y-r.bottom:0);if(d<bd&&d<24){bd=d;best=b;}});
    return best;
  };
  const setCand=btn=>wrap.querySelectorAll(".choice").forEach(b=>b.classList.toggle("cand",b===btn));
  const clearCand=()=>wrap.querySelectorAll(".choice.cand").forEach(b=>b.classList.remove("cand"));
  wrap.addEventListener("pointerdown",e=>{
    if(answered)return;
    const btn=choiceAt(e.clientX,e.clientY);if(!btn)return;
    active=true;try{wrap.setPointerCapture(e.pointerId);}catch(_){}
    setCand(btn);e.preventDefault();
  });
  wrap.addEventListener("pointermove",e=>{if(active)setCand(choiceAt(e.clientX,e.clientY));}); // 指の下の選択肢に候補を移動（外れたら候補なし）
  const finish=e=>{
    if(!active)return;active=false;
    const btn=choiceAt(e.clientX,e.clientY);
    clearCand();
    if(btn&&!answered)pick(btn.dataset.v); // 離した位置で確定。選択肢外なら何もしない
  };
  wrap.addEventListener("pointerup",finish);
  wrap.addEventListener("pointercancel",()=>{active=false;clearCand();});
}

/* 回答送信（二重送信防止） */
function submit(status,userAnswer){
  if(answered)return;answered=true;clearInterval(timer);
  const q=state.questions[state.idx],limit=curLimit();
  let elapsed=(performance.now()-qStart)/1000;
  if(status==="timeout")elapsed=limit; else if(elapsed>limit){elapsed=limit;status= status==="correct"?"timeout":status;}
  const isCorrect=status==="correct";
  const isHint=!!q.isHintProvided;
  const score=scoreFor(q.type,isCorrect,elapsed,isHint);
  // ---- タイプ診断用の誤答メタ ----
  let distractorType=null,selectedWrongWordId=null,writingErrorType=null,writingErrorDetail=null;
  if(q.type!=="w"){
    if(status==="incorrect"&&q.cmeta&&q.cmeta[userAnswer]){
      distractorType=q.cmeta[userAnswer].distractorType;
      selectedWrongWordId=q.cmeta[userAnswer].wordId;
    }
  }else if(status==="incorrect"){
    const cw=classifyWritingError(userAnswer,q.word);
    writingErrorType=cw.type;writingErrorDetail=cw.detail;selectedWrongWordId=cw.wrongWordId;
  }
  // ---- 記憶スコア更新（忘却/形成エンジン） ----
  const C=MEMORY_CONFIG,nowMs=Date.now(),answeredAt=new Date(nowMs).toISOString();
  const stats=loadStats(),st=getStat(q.word.id,stats);
  const isWriting=q.type==="w",r=elapsed; // 回答秒（0.1秒単位）
  const fast=isWriting?(r<C.fastWritingSec):(r<C.fastChoiceSec);
  // 前状態スナップショット
  const sBefore=st.stabilityHours,dwBefore=st.wordDifficulty,memBefore=st.memoryScore;
  const dispBefore=displayMemoryScore(st,nowMs);
  const Mp=dispBefore; // 予測記憶率
  // 実測記憶率A
  let A;
  if(isCorrect)A=C.correctActualMin+(C.correctActualMax-C.correctActualMin)*Math.exp(-C.responseSpeedAlpha*r);
  else A=(status==="incorrect")?C.actualIncorrect:(status==="timeout"?C.actualTimeout:C.actualUnknown);
  const E=A-Mp;
  // 安定度Suの更新（予測誤差で学習）
  st.stabilityHours=clampN(st.stabilityHours*Math.exp(C.predictionLearningRateGamma*E/100),C.minStabilityHours,C.maxStabilityHours);
  // 同日定着カウント
  const today=dayKey(nowMs);
  if(isCorrect){ if(st.lastReviewDay!==today)st.sameDayCorrectCount=0; st.sameDayCorrectCount=(st.sameDayCorrectCount||0)+1; }
  st.lastReviewDay=today;
  // memoryScore / formingScore
  if(!st.hasEverCorrect){
    if(isCorrect){ st.hasEverCorrect=true; st.firstCorrectAt=answeredAt; st.memoryScore=C.firstCorrectMemoryScore; } // 初正解
    else st.formingScore=(st.formingScore||0)+(status==="incorrect"?C.formingIncorrectGain:status==="timeout"?C.formingTimeoutGain:C.formingUnknownGain); // 初正解前は減点せず接触で加点
  }else{
    let delta;
    if(isCorrect)delta=isWriting?(fast?C.writingFastCorrectDelta:C.writingNormalCorrectDelta):(fast?C.choiceFastCorrectDelta:C.choiceNormalCorrectDelta);
    else delta=(status==="incorrect")?(isWriting?C.writingIncorrectDelta:C.choiceIncorrectDelta):(status==="timeout"?C.timeoutDelta:C.unknownDelta);
    if(isCorrect&&isHint)delta*=C.hintMultiplier;
    st.memoryScore=clampN(dispBefore+delta,0,100); // 現在記憶率を起点に加算しM0を更新
  }
  // 単語難易度の緩やかな適応
  if(isCorrect&&fast)st.wordDifficulty=clampN(st.wordDifficulty-0.02,C.minWordDifficulty,C.maxWordDifficulty);
  else if(!isCorrect)st.wordDifficulty=clampN(st.wordDifficulty+0.03,C.minWordDifficulty,C.maxWordDifficulty);
  // カウンタ等
  st.hasSeen=true; st.lastReviewedAt=answeredAt; st.reviewCount=(st.reviewCount||0)+1;
  if(isCorrect){st.correctCount=(st.correctCount||0)+1;st.consecutiveCorrectCount=(st.consecutiveCorrectCount||0)+1;}
  else{st.incorrectCount=(st.incorrectCount||0)+1;st.consecutiveCorrectCount=0;}
  const rtMs=Math.round(elapsed*1000);
  st.averageResponseTimeMs=st.reviewCount<=1?rtMs:Math.round((st.averageResponseTimeMs*(st.reviewCount-1)+rtMs)/st.reviewCount);
  st.lastAnswerStatus=status; st.lastAnswerType=ANS_TYPE[q.type]; st.lastResponseTimeSec=Math.round(elapsed*10)/10; st.isHintProvided=isHint;
  // 次回復習推奨日時
  const dispAfter=displayMemoryScore(st,nowMs);
  if(!st.hasEverCorrect){ st.nextReviewAt=new Date(nowMs+C.initialFormingStabilityHours*3600000).toISOString(); }
  else if(st.memoryScore<=C.reviewThreshold){ st.nextReviewAt=answeredAt; }
  else { const hrs=effectiveStability(st,nowMs)*Math.log(st.memoryScore/C.reviewThreshold); st.nextReviewAt=new Date(nowMs+Math.max(0,hrs)*3600000).toISOString(); }
  stats[q.word.id]=st; saveStats(stats);
  // 単語カード獲得: 正解=残り秒ぶん(最大10) / 不正解・unknown=残り秒÷3(最大3) / 時間切れ=0
  const remainSec=Math.max(0,limit-elapsed);
  let cardsEarned;
  if(isCorrect)cardsEarned=Math.min(10,Math.floor(remainSec));
  else if(status==="timeout")cardsEarned=0;
  else cardsEarned=Math.min(3,Math.floor(remainSec/3));
  addCards(q.word.id,cardsEarned);
  // 履歴（上書きせず全保存）
  const rec={
    userId:state.userId,wordId:q.word.id,testId:state.testId,questionNumber:state.idx+1,
    korean:q.word.ko,japanese:q.word.ja,answerType:ANS_TYPE[q.type],direction:DIRECTION[q.type],questionType:ANS_TYPE[q.type],
    userAnswer:userAnswer||"",correctAnswer:q.correct,answerStatus:status,isCorrect,
    selectedWrongWordId,distractorType,writingErrorType,writingErrorDetail,
    isHintProvided:isHint,hintText:q.hintText||null,
    cycleNumber:state.cycleNumber,questionSource:q.source||"new",
    responseTimeMs:rtMs,responseTimeSec:Math.round(elapsed*10)/10,score,answeredAt,
    memoryScoreBefore:memBefore,memoryScoreAfter:st.memoryScore,
    stabilityHoursBefore:sBefore,stabilityHoursAfter:st.stabilityHours,
    displayMemoryScoreBefore:Math.round(dispBefore),displayMemoryScoreAfter:Math.round(dispAfter),
    predictedMemory:Math.round(Mp),actualMemory:Math.round(A),predictionError:Math.round(E),
    wordDifficultyBefore:dwBefore,wordDifficultyAfter:st.wordDifficulty,
    nextReviewAt:st.nextReviewAt,cardsEarned,
    displayMemoryScoreAfterDecay:Math.round(dispAfter) // 互換
  };
  state.results.push(rec);saveAnswer(rec);
  if(isCorrect)sfxCorrect();else if(status==="unknown")sfxNeutral();else sfxIncorrect(); // 正解=正解音／わからない=中立音／不正解・時間切れ=不正解音
  speakKorean(q.word); // 正解・不正解・わからない・時間切れすべてで正解の韓国語音声を再生（学習のため）
  if(isCorrect)spawnWordDrop(q.word,Math.max(0,limit-elapsed)/limit); // 正解（四択・書き取りとも）：単語玉が背景に降り積もる（速答ほど大きい）
  showOverlay(status,q,userAnswer);
}

/* 正誤表示：○×記号を重ねつつ、四択は選択肢を色分け、書き取りは入力/正解を色分け表示（「正解」「不正解」テキストは出さない） */
function showOverlay(status,q,userAnswer){
  const isCorrect=status==="correct";
  const ov=document.createElement("div");
  ov.className="overlay"+(q.type==="w"?" backdrop":"");
  const OVSYM={correct:["o","○"],incorrect:["x","×"],unknown:["u","－"],timeout:["t","△"]};
  const os=OVSYM[status]||["x","×"]; // わからない=－ / 時間切れ=△ を正しく出す（結果・履歴表と統一）
  let inner=`<div class="ovsym ${os[0]}">${os[1]}</div>`;
  if(q.type==="w"){
    inner+=writingAnsHTML(status,q,userAnswer);
  }else{
    highlightChoices(q,status,userAnswer); // 実際の選択肢ボタンを色分け（赤=正解 / 青=選んだ誤答）
  }
  const tap=loadSettings().tapAdvance;
  if(tap)inner+='<div class="tap-next">タップで次へ ›</div>';
  ov.innerHTML=inner;
  document.body.appendChild(ov);
  const advance=()=>{if(ov._done)return;ov._done=true;_ovAdvance=null;ov.remove();afterAnswer();};
  // 回答後のどの状態（タップ待ち/自動送り待ち/切替直後）でも1つのハンドラで処理する
  ov.addEventListener("click",(e)=>{
    if(ov._done)return;
    const els=document.elementsFromPoint(e.clientX,e.clientY);
    // 進み方スイッチはオーバーレイ越しでも常に操作可能（押した瞬間にモードを移行）
    if(els.some(n=>n.id==="qadv"||(n.closest&&n.closest("#qadv")))){
      toggleAdvMode();
      clearTimeout(ovTimer);
      const tapNow=loadSettings().tapAdvance;
      ov.style.cursor=tapNow?"pointer":"";
      const tn=ov.querySelector(".tap-next");
      if(tapNow){
        if(!tn)ov.insertAdjacentHTML("beforeend",'<div class="tap-next">タップで次へ ›</div>');
        if(q.type!=="w")addChoiceSpeakers();
      }else{
        if(tn)tn.remove();
        ovTimer=setTimeout(advance,800); // オフに切替→自動送りへ移行
      }
      return;
    }
    if(!loadSettings().tapAdvance)return; // 自動送り待ち中の他タップは無視
    if(q.type!=="w"){ // オーバーレイ越しに選択肢を叩いたらその単語の韓国語音声（次へは進まない）
      const hit=els.find(el=>el.classList&&el.classList.contains("choice"));
      if(hit){speakChoiceKo(q,hit.dataset.v);return;}
    }
    advance();
  });
  if(tap){
    ov.style.cursor="pointer";
    if(q.type!=="w")addChoiceSpeakers(); // 各選択肢の右端に音声マーク
  }else{
    _ovAdvance=advance;ovTimer=setTimeout(advance,isCorrect?1000:2000); // 自動送り（タブ離脱中は止め、復帰後に再開）
  }
}
/* 四択正解時：単語画像入りの白半透明カプセル玉が落下し、衝突・転がりながらどんどん積もる（簡易物理・背景レイヤー） */
const QR={balls:[],raf:0,last:0,calm:0,rainTimer:0};
let _ballLog=[]; // ホームでまだ降らせていない正解玉（テストをまたいで蓄積）
function spawnWordDrop(word,speed){
  try{
    const src=(typeof WORD_IMG!=="undefined")?WORD_IMG[word.ko]:null;if(!src)return;
    const r=32+Math.round(28*Math.min(1,Math.max(0,speed==null?0.5:speed))); // 速答ほど大きい玉（直径64〜120px）
    const bg=roomBg(curSection); // 玉のカプセル色は出題ROOMの背景色
    _ballLog.push({src,r,bg});if(_ballLog.length>48)_ballLog.shift();
    spawnBallRaw(src,r,bg);
  }catch(e){}
}
function spawnBallRaw(src,r,bg,layerId){
  if(loadSettings().balls===false)return; // 玉の演出オフ
  layerId=layerId||"q-rain";
  const layer=document.getElementById(layerId);if(!layer)return;
  const cap=layerId==="home-rain"?48:30; // ホームは7日ぶんを残せるよう多め
  const inLayer=QR.balls.filter(b=>b.layer===layerId);
  if(inLayer.length>=cap){
    const old=inLayer[0];old.el.remove();QR.balls.splice(QR.balls.indexOf(old),1);
    // 静止済みの山（約36個）は起こさず固定のまま。新しく降る玉だけが動く（計算を抑える）
  }
  const el=document.createElement("div");el.className="qr-ball";
  el.style.width=el.style.height=(r*2)+"px";
  el.style.willChange="transform"; // 落下中のみGPU昇格（停止時にautoへ戻す）
  if(bg)el.style.background=bg+"D9"; // ROOM色85%
  el.innerHTML=src?`<img src="${src}" alt="">`:""; // 画像なし単語は無地カプセル
  layer.appendChild(el);
  const W=layer.clientWidth||602;
  QR.balls.push({x:r+Math.random()*(W-2*r),y:-r-10,vx:(Math.random()*2-1)*120,vy:0,a:0,va:0,r,el,layer:layerId});
  QR.active=layerId;QR.calm=0;QR.sinceSpawn=0; // 新規落下があれば確定停止カウンタをリセット
  if(!QR.raf){QR.last=0;QR.raf=requestAnimationFrame(qrStep);}
}
function qrClearLayer(layerId){QR.balls=QR.balls.filter(b=>{if(b.layer===layerId){b.el.remove();return false;}return true;});}
function qrStopRain(){if(QR.rainTimer){clearInterval(QR.rainTimer);QR.rainTimer=0;}}
/* ホームの玉レイヤーは現在ROOMスライドのslide-inner最背面に挿し込む（ROOM画像の後ろに積もる）。再構築・ROOM切替で差し直しても玉DOMは保持 */
function attachHomeRain(){
  if(!QR.homeEl){QR.homeEl=document.createElement("div");QR.homeEl.className="q-rain";QR.homeEl.id="home-rain";}
  const host=document.querySelector(`.room-slide[data-n="${curSection}"] .slide-inner`);
  if(host&&QR.homeEl.parentNode!==host)host.insertBefore(QR.homeEl,host.firstChild);
  // レイヤー剥がれ等で物理ループが死んでいたら再開。ただし全玉が既に眠っていれば再開しない（無駄なピクピク再燃を防ぐ）
  if(!QR.raf&&QR.balls.some(b=>b.layer==="home-rain"&&!b.sleep)&&document.getElementById("s-home").classList.contains("on")){
    QR.active="home-rain";QR.calm=0;QR.last=0;QR.raf=requestAnimationFrame(qrStep);
  }
}
/* 起動時：過去7日間に正解した単語（直近30件）を玉として積み直す＝ホームの山は7日間保持 */
let _bootRained=false;
function bootBallLog(){
  if(_bootRained)return;_bootRained=true;
  try{
    const cutoff=Date.now()-7*86400000,m=secOfWord();
    loadHistory().filter(r=>r.isCorrect&&new Date(r.answeredAt).getTime()>=cutoff).slice(-48).forEach(r=>{
      const w=WORD_BY_ID[r.wordId];if(!w)return;
      const src=(typeof WORD_IMG!=="undefined")?WORD_IMG[w.ko]:null;if(!src)return;
      const limit=r.answerType==="writing"?20:10;
      const sec=r.responseTimeSec!=null?r.responseTimeSec:limit;
      const rr=32+Math.round(28*Math.min(1,Math.max(0,(limit-sec)/limit)));
      const key=m[r.wordId],sn=key?parseInt(key.split("-")[1],10):curSection;
      _ballLog.push({src,r:rr,bg:roomBg(sn||curSection)});
    });
    if(_ballLog.length>48)_ballLog=_ballLog.slice(-48);
  }catch(e){}
}
/* ホーム帰還時：未降下の玉（複数テストぶん含む）を0.1秒間隔でホーム背景レイヤーに一斉降下。既存の山の上に積み増す */
function homeRain(){
  attachHomeRain();
  if(!_ballLog.length||QR.rainTimer)return;
  QR.active="home-rain";
  const q=_ballLog.slice();_ballLog=[];
  let i=0;
  QR.rainTimer=setInterval(()=>{
    const home=document.getElementById("s-home");
    if(!home||!home.classList.contains("on")){ // ホーム離脱: 残りを_ballLogに戻してタイマー停止（空回り＆後続homeRainのブロックを防ぐ。戻ったら続きから降る）
      if(i<q.length)_ballLog.unshift(...q.slice(i));
      qrStopRain();return;
    }
    if(i>=q.length){qrStopRain();return;}
    const b=q[i++];spawnBallRaw(b.src,b.r,b.bg,"home-rain");
  },100);
}
function qrStep(ts){
  let layer;
  if(QR.active==="home-rain"){ // ホーム層はスライド再構築で剥がれることがあるため毎フレーム差し直す
    const host=document.querySelector(`.room-slide[data-n="${curSection}"] .slide-inner`);
    if(host&&QR.homeEl&&QR.homeEl.parentNode!==host)host.insertBefore(QR.homeEl,host.firstChild);
    layer=QR.homeEl&&QR.homeEl.isConnected?QR.homeEl:null;
  }else layer=document.getElementById(QR.active);
  const scrOk=QR.active==="home-rain"
    ?document.getElementById("s-home").classList.contains("on")
    :QR.active==="wd-rain"
    ?document.getElementById("s-wdetail").classList.contains("on")
    :["s-quiz","s-result"].some(id=>{const e=document.getElementById(id);return e&&e.classList.contains("on");});
  if(!layer||!scrOk){QR.raf=0;return;} // 対象画面を離れたら停止（次のspawn/ホーム復帰/attachで再開）
  if(!QR.last)QR.last=ts;
  const dt=Math.min(0.032,(ts-QR.last)/1000);QR.last=ts;
  const W=layer.clientWidth,H=layer.clientHeight,G=2400,bs=QR.balls.filter(b=>b.layer===QR.active); // 物理はアクティブレイヤーの玉のみ（他レイヤーは凍結保持）
  for(const b of bs){
    if(b.sleep)continue; // 静止済みの玉は演算スキップ（100個でも軽い）
    if(!b.supported)b.vy+=G*dt; // 下から支えられている玉に重力を加えない（重力↔押し戻しの永久振動を防ぐresting contact）
    b.supported=false;
    b.vx*=0.985;b.vy*=0.992; // エネルギー減衰（密集した山が早く静まる）
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.a+=b.va*dt;
    if(b.y>H-b.r){b.y=H-b.r;if(b.vy>0)b.vy=-b.vy*0.2;if(Math.abs(b.vy)<40)b.vy=0;b.vx*=0.96;b.va=b.vx/b.r;b.supported=true;} // 床：小バウンド＋接地摩擦、回転は移動速度連動（自然な転がり）
    if(b.x<b.r){b.x=b.r;b.vx=-b.vx*0.4;}
    if(b.x>W-b.r){b.x=W-b.r;b.vx=-b.vx*0.4;}
  }
  // 衝突はx順ソート＋近傍だけ判定するスイープ法（総当たりのO(n^2)を回避）。両方眠っているペアは飛ばす
  const sx=bs.slice().sort((a,b)=>a.x-b.x);
  for(let i=0;i<sx.length;i++){
    const A=sx[i];
    for(let j=i+1;j<sx.length;j++){
      const B=sx[j];
      if(B.x-A.x>A.r+60)break; // 最大半径60px以上離れた右側とは当たらない
      if(A.sleep&&B.sleep)continue;
      let dx=B.x-A.x,dy=B.y-A.y,d=Math.hypot(dx,dy)||0.01;
      const rr=A.r+B.r;
      const pen=rr-d; // めり込み量
      if(pen>0){
        const nx=dx/d,ny=dy/d;
        // 支え判定（上に載っているか）は接触した時点で常に更新
        if(ny>0.5)A.supported=true;
        if(ny<-0.5)B.supported=true;
        if(pen>0.6){ // 0.6pxのスロップ内は補正しない＝残留ジッタを出さない
          // 静止済みの玉は不動（無限質量）として扱い、動いている玉だけを押し戻す＝山は固定・落下玉のみ演算
          const corr=(pen-0.6)*(A.sleep!==B.sleep?1:0.4); // 片方が固定なら全量を可動側で解消
          if(!A.sleep){A.x-=nx*corr;A.y-=ny*corr;}
          if(!B.sleep){B.x+=nx*corr;B.y+=ny*corr;}
          const rel=(B.vx-A.vx)*nx+(B.vy-A.vy)*ny;
          if(rel<0){const imp=-rel*0.4;if(!A.sleep){A.vx-=nx*imp;A.vy-=ny*imp;}if(!B.sleep){B.vx+=nx*imp;B.vy+=ny*imp;}}
          if(!A.sleep)A.va=A.vx/A.r;if(!B.sleep)B.va=B.vx/B.r;
        }
      }
    }
  }
  let moved=0;
  for(const b of bs){
    b.x=Math.max(b.r,Math.min(W-b.r,b.x));b.y=Math.min(b.y,H-b.r);
    const d=Math.abs(b.x-(b.px!=null?b.px:b.x))+Math.abs(b.y-(b.py!=null?b.py:b.y));
    moved+=d;
    const slow=Math.abs(b.vx)+Math.abs(b.vy)<8; // ほぼ停止
    if(d<0.4&&slow){b.still=(b.still||0)+1;if(b.still>12){b.sleep=true;b.vx=0;b.vy=0;b.va=0;}} // 個別スリープ
    else b.still=0;
    b.px=b.x;b.py=b.y;
    if(d>0.15||!b.drawn){b.el.style.transform=`translate(${Math.round(b.x-b.r)}px,${Math.round(b.y-b.r)}px) rotate(${b.a.toFixed(2)}rad)`;b.drawn=true;} // 0.15px以上動いた玉のみ整数座標で描画（サブピクセルのピクピク抑制）
  }
  // 全体が十分静まったらループ停止（残留ジッタで回り続けないよう緩めのしきい値）
  QR.calm=(moved<bs.length*0.3||bs.every(b=>b.sleep))?QR.calm+1:0;
  QR.sinceSpawn=(QR.sinceSpawn||0)+1;
  // 確定停止：静まった or 最後の落下から約3.5秒(210フレーム)経過。密集でjamしても必ずピクピクを止める
  if(QR.calm>30||QR.sinceSpawn>210){bs.forEach(b=>{b.sleep=true;b.vx=0;b.vy=0;b.va=0;b.el.style.willChange="auto";});QR.raf=0;return;} // 停止時はwill-changeを解除しGPUメモリを返す
  QR.raf=requestAnimationFrame(qrStep);
}

/* 回答後（タップで次へ設定時）用：選択肢右端の音声マークと、選択肢の韓国語読み上げ */
const SPK_SVG='<svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="#fff"/><path d="M16 8.6a4.2 4.2 0 010 6.8M18.6 6.2a7.6 7.6 0 010 11.6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
function addChoiceSpeakers(){document.querySelectorAll("#qstage .choice").forEach(b=>{if(!b.querySelector(".chspk"))b.insertAdjacentHTML("beforeend",`<span class="chspk">${SPK_SVG}</span>`);});}
function speakChoiceKo(q,v){
  try{
    let ko=null;
    if(q.type==="jk")ko=v; // 選択肢自体が韓国語
    else if(v===q.correct)ko=q.word.ko;
    else{const m=q.cmeta&&q.cmeta[v];if(m&&m.wordId!=null&&WORD_BY_ID[m.wordId])ko=WORD_BY_ID[m.wordId].ko;} // Section01の手作り誤答(wordId=null)は対応する韓国語が無いため再生しない
    if(ko)speakSmart(ko); // 2度押しでゆっくり再生
  }catch(e){}
}
/* 四択：正解の選択肢を赤、ユーザーが選んだ誤答を青で強調。その他は暗い灰色のまま */
function highlightChoices(q,status,userAnswer){
  document.querySelectorAll('#qstage .choice').forEach(btn=>{
    const v=btn.dataset.v;
    if(v===q.correct)btn.classList.add('correct');
    else if(status==="incorrect"&&v===userAnswer)btn.classList.add('wrong');
  });
}
/* 書き取り：正解=赤文字 / 不正解=入力(青)+正解(赤) / わからない・時間切れ=正解(赤)のみ */
function writingAnsHTML(status,q,userAnswer){
  const ko=esc(q.word.ko);
  // タップで次へ設定時は音声再生ボタンを正解の「上」に独立した列として置く（正解と同じ位置に重ねない・押しても次に進まない）
  const spk=loadSettings().tapAdvance?`<div class="oa-spkrow"><button class="oa-spk" aria-label="音声を再生（2度押しでゆっくり）" onclick="event.stopPropagation();speakSmart(WORD_BY_ID[${q.word.id}].ko)">${SPK_SVG}<span class="oa-spktxt">音声</span></button></div>`:"";
  if(status==="incorrect"){
    let close="";
    try{
      if(!isPhoneticCloseMiss(userAnswer,q.word.ko)){const cw=classifyWritingError(userAnswer,q.word);if(cw.type==="semantic_substitution")close='<div class="oa-close">意味の近い別の単語</div>';}
    }catch(e){} // 音の近さのヒント文言は出さない（意味近似のみ表示）
    return `<div class="ovans">${close}
      <div class="oa-row"><div class="oa-lab">入力</div><div class="oa-ko wrong">${esc(userAnswer)||"（無回答）"}</div></div>
      ${spk}
      <div class="oa-row"><div class="oa-lab">正解</div><div class="oa-ko correct">${ko}</div></div>
    </div>`;
  }
  // correct / unknown / timeout は韓国語の正解のみ（正解時は音声も再生）。音声ボタンは正解の上に独立表示
  return `<div class="ovans">${spk}<div class="oa-ko correct">${ko}</div></div>`;
}
function afterAnswer(){
  if(state.idx>=11){finishTest();return;}
  state.idx++;renderQuestion();
}

/* 出題画面ヘッダーの「タップで次へ」スイッチ */
function updateAdvBtn(){const sw=document.getElementById("qsw");if(sw)sw.classList.toggle("on",!!loadSettings().tapAdvance);}
function toggleAdvMode(){const st=loadSettings();st.tapAdvance=!st.tapAdvance;saveSettings(st);updateAdvBtn();}

/* ============================================================ キーボード ============================================================ */
const KB_ROWS=[["ㅂ","ㅈ","ㄷ","ㄱ","ㅅ","ㅛ","ㅕ","ㅑ","ㅐ","ㅔ"],["ㅁ","ㄴ","ㅇ","ㄹ","ㅎ","ㅗ","ㅓ","ㅏ","ㅣ"],["ㅋ","ㅌ","ㅊ","ㅍ","ㅠ","ㅜ","ㅡ"]];
/* Shiftなしで直接入力できる専用行：濃音 → 合成母音(旧Shift) → その他の合成母音 */
const KB_EXTRA_ROWS=[
  ["ㄲ","ㄸ","ㅃ","ㅆ","ㅉ","ㅒ","ㅖ"],       // 濃音 + 合成母音（旧Shift）を1行に
  ["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"]        // その他の合成母音
];
/* Shift・Spaceキーは廃止。濃音/合成母音は専用キー(KB_EXTRA_ROWS)で直接入力する */
function keyboardHTML(){
  let h='<div class="korean-keyboard" id="kbd">';
  KB_ROWS.forEach(row=>{
    h+='<div class="krow">';
    row.forEach(k=>h+=`<button class="key" data-k="${k}" onclick="kbKey('${k}')">${k}</button>`);
    h+='</div>';
  });
  KB_EXTRA_ROWS.forEach(row=>{
    h+='<div class="krow extra">';
    row.forEach(k=>h+=`<button class="key ex" data-k="${k}" onclick="kbKey('${k}')">${k}</button>`);
    h+='</div>';
  });
  // 操作行：わからない(左) / 回答する(中央・大) / ⌫(右)。Clearは廃止
  h+=`<div class="krow ctrl">
    <button class="key dontknow" onclick="submit('unknown','')">わからない</button>
    <button class="key send" onclick="kbSend()">回答する</button>
    <button class="key fn" onclick="kbBack()">⌫</button>
  </div></div>`;
  return h;
}
function kbKey(base){IME.input(base);refreshInput();}
function kbBack(){IME.backspace();refreshInput();}
function kbSend(){
  const q=state.questions[state.idx];const ans=IME.text().trim();
  // Spaceキー廃止のため空白は無視。キーボードで打てない記号(〜等)も無視して判定
  const norm=s=>s.replace(/[\s~〜・･]/g,"");
  submit(norm(ans)===norm(q.correct)?"correct":"incorrect",ans);
}
function refreshInput(){const el=document.getElementById("winput");if(!el)return;const t=IME.text();el.innerHTML=esc(t)+'<span class="wcaret"></span>';}

/* ============================================================ 結果画面 ============================================================ */

function pickResultCheer(totalDisp,nCorrect,newCnt){
  let pool;
  if(totalDisp>=90)pool=RESULT_CHEERS.high;
  else if(nCorrect<=4&&newCnt>=6)pool=RESULT_CHEERS.lowNew;
  else if(nCorrect<=4)pool=RESULT_CHEERS.low;
  else pool=RESULT_CHEERS.mid;
  return pool[Math.floor(Math.random()*pool.length)];
}
function finishTest(){
  const R=state.results,totalRaw=R.reduce((a,r)=>a+r.score,0),total=Math.ceil(totalRaw),rank=rankFor(total); // 小数は切り上げ
  const totalDisp=total;
  const nCorrect=R.filter(r=>r.isCorrect).length,nWrong=12-nCorrect;
  let perfect=getPerfectCount();if(total===100)perfect=incPerfectCount();
  if(!state.isReview)updateSectionRank(curSection,rank); // 過去最高ランクを上回った場合のみ更新
  // 今回の変化（記憶コンディション・要復習語数・単語別変化）を保存
  const nowMs=Date.now();
  const changes=R.map(r=>({id:r.wordId,ko:r.korean,ja:r.japanese,before:Math.round(r.memoryScoreBefore),after:Math.round(r.memoryScoreAfter)}));
  saveSession({at:new Date().toISOString(),before:state.conditionBefore,after:Math.round(overallCondition(nowMs)),
    reviewBefore:state.reviewBefore,reviewAfter:reviewNeedCount(nowMs),
    improved:changes.filter(c=>c.after>c.before).length,changes});
  // タイプ診断を再計算し外枠色を更新（テスト終了時のみ。回答中は更新しない）
  const dg=updateDiagnosis();
  _lastResult={total:totalDisp,rank,nCorrect,code:(dg&&dg.diag&&dg.diag.code)||""};
  track("test_complete",{score:totalDisp,rank:rank,correct:nCorrect});
  const typeUpd=(dg.changed&&dg.prevCode&&dg.prevCode!==dg.diag.code)
    ?`<div class="type-upd">WORD TYPE UPDATED　<b>${esc(dg.prevCode)} → ${esc(dg.diag.code)}</b></div>`:"";
  const SYM={correct:["○","#FF3B3B"],incorrect:["×","#2F6FE0"],unknown:["－","rgba(255,255,255,.75)"],timeout:["△","#DFB10F"]};
  // 結果の単語一覧は「獲得カード」風のグリッド。各カードに正誤記号と記憶率(忘却度)＋変化を載せる
  const rows=R.map(r=>{
    const sy=SYM[r.answerStatus]||["−",""];
    const syc=r.isHintProvided?"#FFD84D":sy[1];
    const dAfter=(r.displayMemoryScoreAfter!=null?r.displayMemoryScoreAfter:(r.displayMemoryScoreAfterDecay!=null?r.displayMemoryScoreAfterDecay:r.memoryScoreAfter))||0;
    const dBefore=(r.displayMemoryScoreBefore!=null?r.displayMemoryScoreBefore:r.memoryScoreBefore)||0;
    const dlt=Math.round(dAfter-dBefore),rateNow=Math.round(dAfter);
    const img=(typeof WORD_IMG!=="undefined"&&WORD_IMG[r.korean])?`<img src="${WORD_IMG[r.korean]}" alt="">`:`<div class="cg-noimg">🃏</div>`;
    return `<div class="rc-card">
      <span class="rc-sym" style="color:${syc}">${sy[0]}</span>
      ${img}
      <div class="rc-ko">${esc(r.korean)}</div>
      <div class="rc-foot"><span class="rc-rate">${rateNow}%</span><span class="rc-dlt" style="color:${dlt>=0?"#1FAD62":"#FF6B6B"}">${dlt>0?"+":""}${dlt}</span></div>
    </div>`;
  }).join("");
  const _ri=roomInfoFor(curSection),pwrAfter=_ri.pwr,pwrBefore=(state.roomPwrBefore!=null?state.roomPwrBefore:0),pwrDelta=pwrAfter-pwrBefore; // そのROOMのPWR
  enqueuePresent(rank,pwrDelta); // このテストのプレゼント（レベル/ランク/PWR/レインボー）を1個追加
  // ホーム復帰時のお知らせ：その日初テストなら連続ログインボーナス、それ以外はプレゼント到着
  const _tday=dayKey(Date.now());
  _homeNotice=(localStorage.getItem("kwt_lasttestday_v1")!==_tday)?{type:"streak"}:{type:"present"};
  localStorage.setItem("kwt_lasttestday_v1",_tday);
  checkAchievements();
  const _firstEver=!localStorage.getItem("kwt_firstdone_v1"); if(_firstEver)_lsSet("kwt_firstdone_v1","1"); // 初回完走
  const firstBanner=_firstEver?`<div class="res-first">🎉 初テストおつかれさま！<br>続けるほど<b>部屋が育ち</b>、正解した単語が<b>カードとして集まり</b>、<b>忘れる前に自動で復習</b>に出ます。まずは毎日1回！</div>`:"";
  document.getElementById("s-result").innerHTML=`
   <div class="res">${firstBanner}
    <div class="res-head">
      <div class="res-top">
        <div class="rank-c rank-medal" style="background:${RANK_COLORS[rank]||"#555"}">${rank}</div>
        <div class="res-right">
          <div class="res-score"><b id="res-score-n" data-to="${totalDisp}">0</b><span> / 100</span></div>
          <div class="res-counts"><span style="color:#FF3B3B">○ ${nCorrect}</span><span style="color:#2F6FE0">× ${nWrong}</span></div>
        </div>
      </div>
      <div class="res-pwr"><span class="pwr-lab">PWR</span><div class="pwr-g"><div id="res-pwrfill" style="background:#00FF37;width:${pwrBefore}%"></div></div><span class="pwr-val">${pwrAfter}%</span><span class="pwr-delta" style="color:${pwrDelta>=0?"#1FAD62":"#FF6B6B"}">${pwrDelta>0?"+":""}${pwrDelta}</span></div>
      <div class="res-cheer">${pickResultCheer(totalDisp,nCorrect,R.filter(r=>(r.displayMemoryScoreBefore||0)===0).length)}</div>
    </div>
    ${typeUpd}
    <div class="res-listwrap"><div class="res-cards">${rows}</div></div>
    <div class="res-btns">
      <button class="btn dark full emph e2" onclick="shareResult()" style="border:1px solid var(--gold);color:var(--gold)">&#120143; 結果をシェアして友達に挑戦</button>
      <button class="btn dark emph e1" onclick="if(typeof track==='function')track('retry');startTest()">もう一度挑戦する</button>
      <button class="btn dark emph e4" onclick="show('s-home')">ホームに戻る</button>
      <button class="btn wt emph e3" onclick="renderRoomCurve()">PWRメータを見る</button>
      ${donateBtnHTML('btn wt')}
      ${installBtnHTML()}
    </div>
    ${adSlotHTML()}
   </div>`;
  show("s-result");
  activateAds(document.getElementById("s-result"));
  // 結果表示の前に「単語カード獲得」演出を全面オーバーレイで見せ、閉じたら結果のアニメを開始
  const cgWords=R.map(r=>({ko:r.korean,ja:r.japanese}));
  showCardGetSequence(cgWords,()=>startResultAnims(pwrAfter));
}
/* 結果画面の入場アニメ：点数カウントアップ・ランクメダル・PWRフィル */
function startResultAnims(pwrAfter){
  const n=document.getElementById("res-score-n");
  if(n){const to=parseInt(n.dataset.to||"0",10);let c=0;const step=Math.max(1,Math.ceil(to/28));
    const t=setInterval(()=>{c=Math.min(to,c+step);n.textContent=c;if(c>=to)clearInterval(t);},28);}
  const md=document.querySelector("#s-result .rank-medal");if(md){md.classList.remove("in");void md.offsetWidth;md.classList.add("in");}
  const pf=document.getElementById("res-pwrfill");if(pf)setTimeout(()=>{pf.style.width=pwrAfter+"%";},150);
}
/* 出題された単語を「カード獲得」演出で1枚ずつ回転表示（結果表示の手前・タップでスキップ） */
function showCardGetSequence(words,done){
  const old=document.querySelector(".cardget");if(old)old.remove();
  const ov=document.createElement("div");ov.className="cardget";
  ov.innerHTML=`<div class="cg-title">獲得した単語カード</div><div class="cg-grid">${words.map((w,i)=>{
    const img=(typeof WORD_IMG!=="undefined"&&WORD_IMG[w.ko])?`<img src="${WORD_IMG[w.ko]}" alt="">`:`<div class="cg-noimg">🃏</div>`;
    return `<div class="cg-card" style="animation-delay:${(i*0.08).toFixed(2)}s">${img}<div class="cg-ko">${esc(w.ko)}</div></div>`;
  }).join("")}</div><div class="cg-skip">タップで結果へ</div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add("on"));
  const fin=()=>{if(ov._t)clearTimeout(ov._t);ov.classList.remove("on");setTimeout(()=>{ov.remove();done&&done();},300);};
  ov._t=setTimeout(fin,Math.min(2800,words.length*80+1500));
  ov.onclick=fin; // タップでスキップ
}

function fmtDate(iso){const d=new Date(iso);const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}

/* 単語詳細: カード型（上=No./記憶率/枚数、中央=大イラスト、下=韓日→履歴）。左右スワイプで前後の単語へ */
let _wdBack="room";
function wdHistRows(wordId){
  const recs=loadHistory().filter(r=>r.wordId===wordId).sort((a,b)=>a.answeredAt.localeCompare(b.answeredAt));
  const SYM={correct:["○","#FF3B3B"],incorrect:["×","#2F6FE0"],unknown:["－","rgba(255,255,255,.75)"],timeout:["△","#DFB10F"]};
  return recs.map(r=>{
    const IC=c=>`<img class="dicon" src="emoji/${c}.svg" alt="">`;
    const dir=(r.answerType==="writing"?IC("270d"):(r.direction==="kr_to_jp"?IC("1f1f0-1f1f7"):IC("1f1ef-1f1f5")))+(r.isHintProvided?IC("1f4a1"):"");
    const mem=(r.displayMemoryScoreAfterDecay!=null)?r.displayMemoryScoreAfterDecay:"—";
    const sy=SYM[r.answerStatus]||["－",""];
    const secs=(r.responseTimeMs!=null?r.responseTimeMs/1000:(r.responseTimeSec!=null?r.responseTimeSec:null)); // 旧データ等でms欠損でもNaNにしない
    const secTxt=secs!=null?secs.toFixed(1):"—";
    return `<tr><td>${fmtDate(r.answeredAt)}</td><td>${dir}</td><td style="color:${sy[1]};font-weight:900">${sy[0]}</td><td class="num">${secTxt}</td><td class="num">${r.score}</td><td class="num">${mem}</td></tr>`;
  }).join("");
}
/* 単語IDから正しい所属ROOMと室内番号を求める（一覧の並び位置ではなくデータ上の所属。最近学んだ単語などどこから開いてもズレない） */
function wordRoomInfo(id){
  if(typeof PRIQQ!=="undefined"&&PRIQQ.ids&&PRIQQ.ids.includes(id)){return {label:"ROOM プリQQ",no:PRIQQ.ids.indexOf(id)+1};}
  const k=secOfWord()[id];if(!k)return {label:"",no:null};
  const h=k.indexOf("-"),lv=k.slice(0,h),n=k.slice(h+1);
  const arr=(LEVEL_SECTIONS[lv]||{})[n]||[];
  return {label:(lv==="beginner"?"初級":"中級")+" ROOM "+String(n).padStart(2,"0"),no:arr.indexOf(id)+1};
}

function wdNav(d){const sc=document.getElementById("wd-scroll");if(sc)sc.scrollBy({left:d*sc.clientWidth,behavior:"smooth"});} // 前後の単語へ
/* 単語詳細ページ上部のページャー（番号を並べ、選択中を中央に。タップでその単語へ） */
function buildWdPager(ids,idx){
  const p=document.getElementById("wd-pager");if(!p)return;
  p.innerHTML=ids.map((id,i)=>{const w=WORD_BY_ID[id];return `<div class="rp-dot wd-dot${i===idx?" cur":""}" data-i="${i}" onclick="wdPagerJump(${i})"><span class="wd-dn">${i+1}</span><span class="wd-dk">${esc(w?w.ko:"")}</span></div>`;}).join("");
  requestAnimationFrame(()=>syncWdPager(idx));
}
function syncWdPager(idx){
  const p=document.getElementById("wd-pager");if(!p||!p.children.length)return;
  [...p.children].forEach((d,i)=>d.classList.toggle("cur",i===idx));
  const cur=p.children[idx];if(cur)p.scrollLeft=cur.offsetLeft-p.clientWidth/2+cur.offsetWidth/2; // 選択中を中央へ
}
function wdPagerJump(i){const sc=document.getElementById("wd-scroll");if(sc)sc.scrollTo({left:i*sc.clientWidth,behavior:"smooth"});}
/* 単語詳細ページ：その単語の出題履歴の数だけ玉を降らせる（回答が速かった出題ほど大きい玉） */
function wdRain(wordId){
  try{
    if(QR.wdTimer){clearInterval(QR.wdTimer);QR.wdTimer=0;}
    qrClearLayer("wd-rain");
    const w=WORD_BY_ID[wordId];if(!w)return;
    const src=(typeof WORD_IMG!=="undefined")?WORD_IMG[w.ko]:null;
    const secKey=secOfWord()[wordId],secN=secKey?parseInt(secKey.split("-")[1],10):curSection;
    const bg=roomBg(secN||curSection);
    const recs=loadHistory().filter(r=>r.wordId===wordId).slice(-30); // 出題1回=玉1個（直近30回まで）

    },90);
  }catch(e){}
}

/* ============================================================ PWRメータ（記憶状態の可視化） ============================================================ */
function memState(rate){ // 状態ラベル
  if(rate>=80)return{label:"安定",cls:"ms-stable"};
  if(rate>=50)return{label:"復習推奨",cls:"ms-review"};
  return{label:"要復習",cls:"ms-urgent"};
}
/* 全体平均を時間軸で前方投影（学習直後→30日後） */
const PROJ=[{l:"直後",h:0},{l:"1h",h:1},{l:"6h",h:6},{l:"12h",h:12},{l:"1日",h:24},{l:"3日",h:72},{l:"7日",h:168},{l:"14日",h:336},{l:"30日",h:720}];
/* 過去1週間の実績（履歴から状態を復元）＋今後30日の予測を合成 */
function chartPoints(nowMs,words){
  const idset=new Set(words.map(w=>w.id)),byWord={};
  loadHistory().forEach(r=>{if(idset.has(r.wordId))(byWord[r.wordId]=byWord[r.wordId]||[]).push(r);});
  Object.values(byWord).forEach(a=>a.sort((x,y)=>String(x.answeredAt).localeCompare(String(y.answeredAt))));
  const pastAt=h=>{ // h時間前のPWR（記録を時刻Tまでリプレイ）
    const T=nowMs-h*3600000;let t=0;
    words.forEach(w=>{
      const recs=byWord[w.id]||[];let last=null;
      for(const r of recs){ if(new Date(r.answeredAt).getTime()>T)break; last=r; }
      if(last){
        const st={memoryScore:last.memoryScoreAfter!=null?last.memoryScoreAfter:0,formingScore:0,
          hasEverCorrect:last.memoryScoreAfter!=null&&last.memoryScoreAfter>0&&(last.firstCorrectAt!=null||last.isCorrect||last.memoryScoreAfter>=45),
          stabilityHours:last.stabilityHoursAfter!=null?last.stabilityHoursAfter:MEMORY_CONFIG.initialStabilityHours,
          wordDifficulty:last.wordDifficultyAfter!=null?last.wordDifficultyAfter:MEMORY_CONFIG.defaultWordDifficulty,
          lastReviewedAt:last.answeredAt,wordId:w.id};
        t+=displayMemoryScore(st,T);
      }
    });
    return t/Math.max(1,words.length);
  };
  const s=loadStats();
  const nowRate=words.reduce((a,w)=>a+displayMemoryScore(getStat(w.id,s),nowMs),0)/Math.max(1,words.length);
  const fut=h=>{let t=0;words.forEach(w=>{const st=getStat(w.id,s);t+=displayMemoryScore(st,nowMs)*Math.exp(-h/effectiveStability(st,nowMs));});return t/Math.max(1,words.length);};
  const pts=[];
  for(let d=7;d>=1;d--)pts.push({label:"-"+d,rate:pastAt(24*d)});
  pts.push({label:"今",rate:nowRate});
  [["+1",24],["+3",72],["+7",168],["+14",336],["+30",720]].forEach(([l,h])=>pts.push({label:l,rate:fut(h)}));
  return pts.map((p,i)=>({i,label:p.label,rate:p.rate}));
}
function projectionPoints(nowMs,words){
  const s=loadStats(),list=words||WORDS;
  return PROJ.map((p,i)=>{
    let t=0;list.forEach(w=>{const st=getStat(w.id,s);t+=displayScore(st,nowMs)*Math.exp(-p.h/Math.max(1,stabilityHours(st)));});
    return{i,label:p.l,rate:t/Math.max(1,list.length)};
  });
}
/* 各単語が記憶率70%を下回るまでの時間(h)。既に70%未満は0 */
function hoursTo70(st,nowMs){
  const cur=displayScore(st,nowMs);
  if(cur<=70)return 0;
  return Math.max(1,stabilityHours(st))*Math.log(cur/70);
}
function memChart(pts){
  const W=320,H=180,padL=25,padB=26,padT=8,padR=4,innerW=W-padL-padR,innerH=H-padT-padB;
  // 縦軸は常に100ではなく、表示データの最大値に合わせて自動スケール（20刻み切り上げ→目盛りが整数になる）
  const ymax=Math.min(100,Math.max(20,Math.ceil(Math.max(...pts.map(p=>p.rate),1)/20)*20));
  const x=i=>padL+innerW*(i/(pts.length-1)),y=r=>padT+innerH*(1-Math.min(r,ymax)/ymax);
  let grid="",lbl="";
  [0,.25,.5,.75,1].forEach(f=>{const v=Math.round(ymax*f),yy=y(v);grid+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="rgba(255,255,255,.30)" stroke-width="1"/><text x="${padL-4}" y="${yy+3}" fill="rgba(255,255,255,.85)" font-size="8" font-weight="700" text-anchor="end">${v}</text>`;});
  pts.forEach((p,i)=>{lbl+=`<text x="${x(i)}" y="${H-padB+14}" fill="rgba(255,255,255,.9)" font-size="8" font-weight="700" text-anchor="middle">${p.label}</text>`;});
  const poly=pts.map(p=>`${x(p.i)},${y(p.rate)}`).join(" ");
  let dots="";pts.forEach(p=>{dots+=`<circle cx="${x(p.i)}" cy="${y(p.rate)}" r="2.6" fill="#00E650"/>`;});
  const th=ymax>=70?`<line x1="${padL}" y1="${y(70)}" x2="${W-padR}" y2="${y(70)}" stroke="#FFD84D" stroke-width="1.4" stroke-dasharray="3 3"/>`:""; // 70%基準線は表示範囲内のときだけ
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${th}${grid}<polyline class="grow" points="${poly}" fill="none" stroke="#00E650" stroke-width="2.4"/>${dots}${lbl}</svg>`;
}

/* PWRメータ: 左右スワイプで 全体(最左) → ROOM01..NN を移動。各スライドは遅延レンダリング */
let _curveIdx=0;
function curveForecastBlock(now,words){
  const s=loadStats();
  const arr=words.map(w=>({w,h:hoursTo70(getStat(w.id,s),now)})).sort((a,b)=>a.h-b.h);
  const today=arr.filter(a=>a.h<=24).length,tom=arr.filter(a=>a.h>24&&a.h<=48).length,d3c=arr.filter(a=>a.h>48&&a.h<=72).length;
  const cards=`<div class="curve-stats">
      <div class="cstat"><div class="k">今日中に復習</div><div class="v ms-urgent">${today}語</div></div>
      <div class="cstat"><div class="k">明日までに復習</div><div class="v ms-review">${tom}語</div></div>
      <div class="cstat"><div class="k">3日以内に復習</div><div class="v">${d3c}語</div></div>
    </div>`;
  return `<div class="tdetail-sec"><div class="h">復習予報</div>${cards}</div>`;
}
function curveSlideHTML(i,now){
  const meter=c=>`<div class="cond pwrline" style="margin:2px 0 12px"><span class="pwr-lab">PWR</span><div class="pwr-g"><div style="background:#00FF37;width:${c}%"></div></div><span class="pwr-val">${c}%</span></div>`;
  if(i===0){ // 最左=全体
    const st=loadStats();
    const learned=Object.keys(st).map(id=>WORD_BY_ID[id]).filter(Boolean);
    const base=learned.length?learned:WORDS;
    return `<div class="mpanel"><div class="cs-head">全体</div>${meter(pwrOverall())}</div>${curveOverall(now,base)}${curveForecastBlock(now,base)}`;
  }
  const nn=String(i).padStart(2,"0");
  const words=(LEVEL_SECTIONS[curLevel][i]||[]).map(id=>WORD_BY_ID[id]);
  const st2=loadStats();let t=0;words.forEach(w=>t+=displayScore(getStat(w.id,st2),now));
  const cond=Math.round(t/Math.max(1,words.length));
  return `<div class="mpanel"><div class="cs-head">ROOM ${nn}</div>${meter(cond)}</div>${curveOverall(now,words)}${curveForecastBlock(now,words)}`;
}

function renderPastResult(testId){
  const R=loadHistory().filter(r=>r.testId===testId).sort((a,b)=>a.answeredAt.localeCompare(b.answeredAt));
  if(!R.length)return;
  const total=Math.ceil(R.reduce((a,r)=>a+(r.score||0),0)),rank=R.length>=12?rankFor(total):null;
  const totalDisp=total;
  const nCorrect=R.filter(r=>r.isCorrect).length,nWrong=R.length-nCorrect;
  const SYM={correct:["○","#FF3B3B"],incorrect:["×","#2F6FE0"],unknown:["－","rgba(255,255,255,.75)"],timeout:["△","#DFB10F"]};
  const rows=R.map((r,i)=>{
    const sy=SYM[r.answerStatus]||["－",""];
    const syc=r.isHintProvided?"#FFD84D":sy[1]; // ヒントありは記号を黄色に（「ヒント」表記は出さない）
    const dAfter=(r.displayMemoryScoreAfter!=null?r.displayMemoryScoreAfter:(r.displayMemoryScoreAfterDecay!=null?r.displayMemoryScoreAfterDecay:r.memoryScoreAfter))||0;
    const dBefore=(r.displayMemoryScoreBefore!=null?r.displayMemoryScoreBefore:r.memoryScoreBefore)||0;
    const dlt=Math.round(dAfter-dBefore);
    return `<tr><td class="no">${r.questionNumber||i+1}</td><td class="ko">${esc(r.korean)}</td><td>${esc(r.japanese)}</td><td style="color:${syc};font-weight:900">${sy[0]}</td><td class="num" style="color:${dlt>=0?"#1FAD62":"#FF6B6B"};font-weight:800">${dlt>0?"+":""}${dlt}</td></tr>`;
  }).join("");
  document.getElementById("s-result").innerHTML=`
   <div class="res">
    <div class="page-head" style="flex:0 0 auto;margin-bottom:4px"><button class="back" onclick="show('s-home')">‹</button><h2>過去の結果</h2></div>
    <div class="res-head">
      <div class="res-top">
        <div class="rank-c" style="background:${rank?(RANK_COLORS[rank]||"#555"):"rgba(0,0,0,.22)"}">${rank||"-"}</div>
        <div class="res-right">
          <div class="res-score">${totalDisp}<span> / 100</span></div>
          <div class="res-counts"><span style="color:#FF3B3B">○ ${nCorrect}</span><span style="color:#2F6FE0">× ${nWrong}</span></div>
        </div>
      </div>
    </div>
    <div class="res-listwrap">
      <table class="rtab"><thead><tr><th class="no">No.</th><th>韓国語</th><th>日本語</th><th>結果</th><th class="num">変化</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <div class="res-btns"><button class="btn line full" onclick="show('s-home')">ホームに戻る</button></div>
   </div>`;
  show("s-result");
}

/* 画面下部の固定広告フッター：広告が実際に配信されたときだけ表示し、
   その高さ分scaleHomeでアプリを縮小してスタートボタン等が隠れないようにする */
function initFooterAd(){
  if(!MONETIZE.adsenseClient||!MONETIZE.footerSlot)return;
  const css=document.createElement("style");
  css.textContent="#ad-footer{position:fixed;left:0;right:0;bottom:0;z-index:900;display:none;justify-content:center;align-items:center;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.15);padding-bottom:env(safe-area-inset-bottom)}body.has-adfooter #ad-footer{display:flex}";
  document.head.appendChild(css);
  const f=document.createElement("div");f.id="ad-footer";
  f.innerHTML=`<ins class="adsbygoogle" style="display:inline-block;width:100%;max-width:728px;height:50px" data-ad-client="${MONETIZE.adsenseClient}" data-ad-slot="${MONETIZE.footerSlot}"></ins>`;
  document.body.appendChild(f);
  ensureAdsense();
  const ins=f.querySelector("ins");
  try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  new MutationObserver(()=>{
    document.body.classList.toggle("has-adfooter",ins.getAttribute("data-ad-status")==="filled");
    scaleHome();
  }).observe(ins,{attributes:true,attributeFilter:["data-ad-status"]});
}
initFooterAd();
function donateBtnHTML(cls){
  if(!MONETIZE.donateUrl)return "";
  return `<a class="${cls||'btn line full'}" href="${MONETIZE.donateUrl}" target="_blank" rel="noopener" onclick="track(&quot;donate_click&quot;)" style="text-decoration:none;display:flex;align-items:center;justify-content:center">${MONETIZE.donateLabel}</a>`;
}
/* ===== シェア・PWA誘導・計測フック ===== */
const track=window.track||function(){};
let _lastResult=null,_bipEvt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();_bipEvt=e;});
function shareResult(){
  const r=_lastResult;if(!r)return;
  track("share_click",{score:r.total,rank:r.rank});
  const lines=[`韓国語単語テスト、12問やって${r.total}点・${r.rank}ランクでした🇰🇷`];
  if(r.code)lines.push(`暗記タイプ診断は「${r.code}」`);
  lines.push(r.rank==="S"?"Sランク、あなたも取れる？（無料・登録不要）":"あなたは何点取れる？（無料・登録不要）");
  lines.push("#韓国語 #韓国語勉強");
  lines.push("https://k-tango.com/?utm_source=share&utm_medium=social&utm_campaign=result");
  const text=lines.join("\n");
  if(navigator.share){navigator.share({text}).catch(()=>{});} // OSの共有シート（LINE等）
  else window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text),"_blank","noopener");
}
function installBtnHTML(){
  if(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)return "";
  if(navigator.standalone)return "";
  const ios=/iPhone|iPad|iPod/.test(navigator.userAgent);
  if(!_bipEvt&&!ios)return "";
  return `<button class="btn line full" onclick="promptInstall()">📲 ホーム画面に追加して毎日1回</button>`;
}
function promptInstall(){
  track("pwa_prompt",{});
  if(_bipEvt){_bipEvt.prompt();_bipEvt=null;return;}
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px";
  ov.innerHTML=`<div style="background:#222;color:#fff;padding:20px;max-width:320px;font-size:14px;line-height:1.8">Safariの共有ボタン（<b>&#x2191;</b> のアイコン）→「ホーム画面に追加」で、アプリとしてすぐ開けるようになります。<br><br><button class="btn dark" style="width:100%" onclick="this.closest(&quot;div&quot;).parentElement.parentElement.remove()">閉じる</button></div>`;
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
/* 設定 */
function _reducedMotion(){return !!(window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches);} // OSの「視差効果を減らす」
function loadSettings(){try{return Object.assign({tapAdvance:false,sound:true,slowTimer:false,balls:!_reducedMotion(),bigText:false,gearMode:false},JSON.parse(localStorage.getItem(LS_SETTINGS)||"{}"));}catch(e){return{tapAdvance:false,sound:true,balls:!_reducedMotion()};}}
function saveSettings(o){_lsSet(LS_SETTINGS,JSON.stringify(o));}
/* 復習リマインダー: 通知許可を取得して設定を保存（実際の定期送信は配信サーバが必要。ここは許可取得と受け皿まで） */
function toggleReminder(){
  const st=loadSettings();
  if(st.notify){st.notify=false;saveSettings(st);openSettings();return;}
  if(typeof Notification==="undefined"){alert("この端末は通知に対応していません");return;}
  Notification.requestPermission().then(p=>{
    st.notify=(p==="granted");saveSettings(st);
    if(p==="granted"){try{navigator.serviceWorker&&navigator.serviceWorker.ready.then(r=>r.showNotification("k-tango",{body:"復習どきになったらお知らせします📚",icon:"images-thumb/0773.webp"}));}catch(e){}}
    else if(p==="denied")alert("端末の設定で通知が拒否されています。ブラウザ設定から許可してください。");
    openSettings();
  }).catch(()=>{});
}
function openSettings(){if(!document.getElementById("settings-modal").classList.contains("on"))pushNav("modal");
  const st=loadSettings();
  const m=document.getElementById("settings-modal");
  const notifyOn=st.notify&&(typeof Notification!=='undefined'&&Notification.permission==='granted');
  const tile=(cls,ico,lab,on,onTxt,offTxt,handler)=>`<div class="cc-tile ${cls} ${on?'on':''}" onclick="${handler}">
    <div class="cc-ico">${ico}</div><div class="cc-txt"><div class="cc-lab">${lab}</div><div class="cc-state">${on?onTxt:offTxt}</div></div></div>`;
  m.innerHTML=`<div class="set-card cc-card">
    <div class="cc-head"><div class="cc-grab"></div><div class="set-h">設定</div><button class="set-close" onclick="closeSettings()" aria-label="閉じる">×</button></div>
    <div class="cc-grid">
      ${tile("k-tap","👆","進み方",st.tapAdvance,"タップで次へ","自動で次へ","toggleSetting('tapAdvance')")}
      ${tile("k-snd","🔊","サウンド",st.sound!==false,"オン","オフ","toggleSetting('sound')")}
      ${tile("k-slow","⏳","じっくり",st.slowTimer,"制限1.5倍","通常","toggleSetting('slowTimer')")}
      ${tile("k-notf","🔔","復習通知",notifyOn,"通知オン","要許可","toggleReminder()")}
      ${tile("k-ball","🫧","玉の演出",st.balls!==false,"積もる","オフ","toggleSetting('balls')")}
      ${tile("k-big","🔠","文字大",st.bigText,"大きめ","標準","toggleSetting('bigText')")}
      ${tile("k-gear","⚙️","歯車モード",st.gearMode,"歯車で出題","通常出題","toggleSetting('gearMode')")}
    </div>
    <div class="cc-list">
      <div class="cc-item" onclick="showCoach()"><span>📖 つかいかた</span><span class="cc-arw">›</span></div>
      <div class="cc-item cc-2btn"><button onclick="exportData()">⬆ 書き出す</button><label>⬇ 読み込む<input type="file" accept="application/json" style="display:none" onchange="importData(this)"></label></div>
      ${/iPhone|iPad|iPod/.test(navigator.userAgent)&&!(window.matchMedia&&matchMedia("(display-mode: standalone)").matches)?`<div class="cc-item cc-note">📲 Safariの共有 →「ホーム画面に追加」でアプリのように使えます</div>`:""}
      ${MONETIZE.donateUrl?`<div class="cc-item" style="justify-content:center">${donateBtnHTML('btn dark full')}</div>`:""}
    </div>
    <div class="cc-links"><a href="learn/">単語帳一覧</a><a href="about.html">このアプリについて</a><a href="privacy.html">プライバシー</a></div>
  </div>`;
  m.classList.add("on");
}
function closeSettings(){document.getElementById("settings-modal").classList.remove("on");}
function toggleSetting(key){
  const st=loadSettings();st[key]=!st[key];saveSettings(st);
  if(key==="balls"&&!st.balls){qrStopRain();qrClearLayer("home-rain");qrClearLayer("q-rain");qrClearLayer("wd-rain");_ballLog=[];}
  if(key==="bigText")document.body.classList.toggle("bigtext",st.bigText);
  if(key==="gearMode")updateStartBtnMode(); // スタートボタンの⚙バッジを即時反映
  openSettings();
}
/* 学習データのバックアップ（kwt_*キーをJSONで書き出し/読み込み） */
function exportData(){
  try{
    const data={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf("kwt_")===0)data[k]=localStorage.getItem(k);}
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:"application/json"}));
    a.download="k-tango-backup-"+dayKey(Date.now())+".json";a.click();
    localStorage.setItem("kwt_lastbackup_v1",new Date().toISOString());
  }catch(e){alert("書き出しに失敗しました");}
}
function importData(inp){
  const f=inp.files&&inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);let n=0;
    Object.keys(d).forEach(k=>{if(k.indexOf("kwt_")===0){localStorage.setItem(k,d[k]);n++;}});
    alert(n+"件のデータを読み込みました。再読み込みします。");location.reload();
  }catch(e){alert("読み込みに失敗しました（ファイル形式を確認してください）");}};
  r.readAsText(f);
}
/* 前回開いていたROOMを起動時に復元 */
function saveLastRoom(){try{localStorage.setItem(LS_LASTROOM,JSON.stringify({level:curLevel,section:curSection}));}catch(e){}}
(function restoreLastRoom(){
  try{
    const v=JSON.parse(localStorage.getItem(LS_LASTROOM)||"null");
    if(v&&LEVEL_INFO[v.level]&&v.section>=1&&v.section<=LEVEL_INFO[v.level].count){
      curLevel=v.level;curSection=v.section;
      renderHome();
      requestAnimationFrame(()=>{const el=document.getElementById("hv-rooms");if(el)el.scrollLeft=(curSection+1)*602;});
    }
  }catch(e){}
})();
updateDiagnosis();   // 起動時に診断を初期化
renderHome();        // ホーム描画＋スケール適用
// 初期起動時はモバイルのツールバー分だけ表示高さが未確定で下端が見切れることがあるため、確定後に再スケール
[80,250,500,1000].forEach(t=>setTimeout(scaleHome,t));
window.addEventListener("load",scaleHome);
window.addEventListener("orientationchange",()=>setTimeout(scaleHome,150));
window.addEventListener("pageshow",scaleHome);
</script>
